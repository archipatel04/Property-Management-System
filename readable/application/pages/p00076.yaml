dynamic-actions: 
- # ====== Dynamic Action: WhatsApp ============================
  id: 15057698777902026
  identification: 
    name: WhatsApp

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: WhatsApp # 15057840870902027

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 15057616325902025
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        window.open('https://wa.me/&P76_PHONE_NUMBER.', '_blank');
        

    execution: 
      sequence: 10
      event: WhatsApp # 15057698777902026
      fire-when-event-result-is: True
      fire-on-initialization: false

