- # ====== Process: New ========================================
  id: 43367076977775414802
  identification: 
    name: New
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      INSERT INTO PMS_PROPERTY_MASTER (
          PROPERTY_TYPE,
          PROPERTY_AVAILABILITY_STATUS,
          ADDRESS,
          PURCHASE_DATE,
          AREA,
          PROPERTY_AGE,
          FLOOR_NUMBER,
          TOTAL_FLOORS,
          FURNISHING_STATUS,
          FACING_DIRECTION,
          IMAGES_VIDEOS_UPLOAD,
          MAP_LOCATION,
          NEAR_BY_LOCATIONS,
          LAT_LONG,
          LANDMARK,
          LISTING_BY,
          PRICE,
          PROJECT_NAME,
          PROPERTY_NAME,
          PURPOSE,
          USER_ID,
          PROPERTY_CATEGORY,
          PROPERTY_UNITS,
          AMENITIES
      )
      VALUES (
          :P43_PROPERTY_TYPES_ID,
          :P43_STATUS_ID,
          :P43_ADDRESS,
          :P43_PURCHASE_DATE,
          :P43_AREA,
          :P43_PROPERTY_AGE,
          :P43_FLOOR_NUMBER,
          :P43_TOTAL_FLOORS,
          :P43_FURNISHING_STATUS,
          :P43_FACING_DIRECTION,
          :P43_IMAGES_VIDEOS_UPLOAD,
          :P43_MAP_LOCATION,
          :P43_NEAR_BY_LOCATIONS,
          :P43_LAT_LONG,
          :P43_LANDMARK,
          :P43_LISTING_BY,
          :P43_PRICE,
          :P43_PROJECT_NAME,
          :P43_PROPERTY_NAME,
          :P43_PURPOSE,
          :USER_ID,
          :P43_PROPERTY_CATEGORY,
          :P43_PROPERTY_UNITS,
          :P43_GENERAL_AMENITIES || ',' ||
          :P43_LIFESTYLE_AMENITIES || ',' ||
          :P43_ECO_FRIENDLY_AMENITIES || ',' ||
          :P43_PREMIUM_AMENITIES || ',' ||
          :P43_CONVENIENCE
      );

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: Property Added.

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: CREATE # 43349278117831123322

  configuration: 
    build-option: Commented Out # 30584983782671713301

