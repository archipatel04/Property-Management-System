- # ====== Page Item: P43_PROPERTY_UNITS =======================
  id: 43349266826572123313
  identification: 
    name: P43_PROPERTY_UNITS
    type: Radio Group

  label: 
    label: Property Units
    alignment: Left

  settings: 
    number-of-columns: 3
    page-action-on-selection: None

  layout: 
    sequence: 40
    region: Property Details # 42922024043990396833
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: PMS_Optional_Above
    template-options: 
    - '#DEFAULT#'

  validation: 
    value-required: false

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT PROPERTY_UNITS_NAME AS DISPLAY_VALUE,
             PROPERTY_UNITS_ID AS RETURN_VALUE
      FROM PMS_PROPERTY_UNITS
      WHERE PROPERTY_UNITS_ID IN (
          SELECT TO_NUMBER(REGEXP_SUBSTR(PROPERTY_UNIT_ID, '[^,]+', 1, LEVEL))
          FROM PMS_PROPERTY_CATEGORY
          WHERE PROPERTY_CATEGORY_ID = :P43_PROPERTY_CATEGORY
          CONNECT BY REGEXP_SUBSTR(PROPERTY_UNIT_ID, '[^,]+', 1, LEVEL) IS NOT NULL
      )
      ORDER BY PROPERTY_UNITS_NAME;
    display-extra-values: false
    display-null-value: false

  cascading-list-of-values: 
