- # ====== Dynamic Action: Set Value ===========================
  id: 14761234562819842
  identification: 
    name: Set Value

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P57_FROM_USER_ID

  actions: 
  - # ====== Action: Set Value ===================================
    id: 14761363208819843
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: |
        SELECT 
            R.ROLE_NAME 
        FROM 
            PMS_ROLES R
        JOIN 
            PMS_USER_ROLE_ACCESS_MASTER UR ON R.ROLE_ID = UR.ROLE_ID
        WHERE 
            UR.USER_ID = :P57_FROM_USER_ID;
      items-to-submit: 
      - P57_FROM_USER_ID
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P57_FROM_TYPE

    execution: 
      sequence: 10
      event: Set Value # 14761234562819842
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

