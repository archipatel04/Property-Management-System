- # ====== Dynamic Action: Not a valid date for appointment ====
  id: 14761833321819848
  identification: 
    name: Not a valid date for appointment

  execution: 
    sequence: 30
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P57_APPOINTMENT_DATE

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 14761968581819849
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        var selectedDate = $v("P57_APPOINTMENT_DATE");
        var blockedDatesStr = $v("P57_SLOT_FULL_DATE");
        
        // Run validation only if selectedDate is not empty
        if (selectedDate) {
            var blockedDates = blockedDatesStr.split(",").map(function(date) {
                return date.trim();
            });
        
            if (blockedDates.includes(selectedDate)) {
                apex.message.alert("⚠ The appointment slots for this date are fully booked. Please select a different date.", function () {
                    $s("P57_APPOINTMENT_DATE", "");         // Clear selected date
                    apex.message.clearErrors();             // Clear any errors
                    $("#P57_APPOINTMENT_DATE").focus();     // Refocus on date picker
                });
            } else {
                apex.message.clearErrors(); // No match, clear any existing error
            }
        }

    execution: 
      sequence: 10
      event: Not a valid date for appointment # 14761833321819848
      fire-when-event-result-is: True
      fire-on-initialization: false

