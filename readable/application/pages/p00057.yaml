- # ====== Page Item: P57_APPOINTMENT_TIME =====================
  id: 15120492351136363
  identification: 
    name: P57_APPOINTMENT_TIME
    type: Select List

  label: 
    label: Appointment Time
    alignment: Left

  settings: 
    page-action-on-selection: None

  multiple-values: 
    type: No

  layout: 
    sequence: 70
    region: PMS Appointment # 15123181716136373
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: Optional - Floating
    template-options: 
    - '#DEFAULT#'
    height: 1

  validation: 
    value-required: false

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT 
          TO_CHAR(TO_DATE(TIME_SLOT, 'HH24:MI'), 'HH:MI AM') AS DISPLAY_TIME,
          TIME_SLOT AS RETURN_TIME
      FROM (
          SELECT 
              TO_CHAR(TRUNC(SYSDATE) + (9/24) + (LEVEL - 1) * (1/24), 'HH24:MI') AS TIME_SLOT
          FROM 
              DUAL
          CONNECT BY 
              LEVEL <= 9  -- 9 AM to 6 PM
      ) slots
      WHERE TIME_SLOT NOT IN (
          SELECT APPOINTMENT_TIME
          FROM PMS_APPOINTMENT
          WHERE PROPERTY_ID = :P46_PROPERTY_ID
            AND TRUNC(APPOINTMENT_DATE) = TO_DATE(:P46_APPOINTMENT_DATE, 'MM-DD-YYYY')
            AND STATUS = 'Pending'
      )
      ORDER BY TIME_SLOT
      
    display-extra-values: true
    display-null-value: true

  cascading-list-of-values: 
    parent-item(s): 
    - P57_APPOINTMENT_DATE
    items-to-submit: 
    - P57_APPOINTMENT_DATE
    parent-required: true

  advanced: 
    warn-on-unsaved-changes: Page Default

  source: 
    form-region: PMS Appointment # 15123181716136373
    column: APPOINTMENT_TIME
    data-type: VARCHAR2
    query-only: false
    primary-key: false

  session-state: 
    storage: Per Request (Memory Only)

  quick-picks: 
    show-quick-picks: false

  security: 
    session-state-protection: Unrestricted
    store-value-encrypted-in-session-state: true
    restricted-characters: All characters can be saved.

