    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select P.PROPERTY_ID,
             P.PROPERTY_TYPES_ID,
             P.STATUS_ID,
             P.ADDRESS,
             P.PURCHASE_DATE,
             P.AREA,
             P.PROPERTY_AGE,
             P.FLOOR_NUMBER,
             P.TOTAL_FLOORS,
             P.FURNISHING_STATUS,
             P.FACING_DIRECTION,
             P.IMAGES_VIDEOS_UPLOAD,
             P.MAP_LOCATION,
             P.NEAR_BY_LOCATIONS,
             P.LAT_LONG,
             TRIM(SUBSTR(p.LAT_LONG, 1, INSTR(LAT_LONG, ',') - 1)) AS LAT_VAL,
             TRIM(SUBSTR(p.LAT_LONG, INSTR(LAT_LONG, ',') + 1)) AS LNG_VAL,
             P.LANDMARK,
             P.LISTING_BY,
             P.PRICE,
             P.PROJECT_NAME,
             P.PROPERTY_NAME,
          --    P.PURPOSE,
      --         CASE P.PURPOSE
      --     WHEN 'Sell' THEN 'success'
      --     WHEN 'Rent' THEN 'warning'
      --   END AS PURPOSE_1,
          CASE P.PURPOSE
          WHEN 'Sale' THEN '<span class="t-Badge t-Badge--success">Sale</span>'
          WHEN 'Rent' THEN '<span class="t-Badge t-Badge--warning">Rent</span>'
          -- ELSE '<span class="t-Badge t-Badge--default">' || PURPOSE || '</span>'
        END AS PURPOSE,
             P.CREATED,
             P.CREATED_BY,
             P.UPDATED,
             P.UPDATED_BY,
             P.USER_ID, 
             U.NAME, 'Details' as Detail 
        from PMS002_PROPERTY P, PMS002_USERS U
        WHERE (P.PROPERTY_AGE BETWEEN :P21_MIN_AGE  and :P21_MAX_AGE) AND U.USERID = P.USER_ID
    page-items-to-submit: 
    - P21_MIN_AGE
    - P21_MAX_AGE

