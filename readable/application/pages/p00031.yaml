dynamic-actions: 
- # ====== Dynamic Action: New =================================
  id: 32901591813953780914
  identification: 
    name: New

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P31_PAGE_ID

  actions: 
  - # ====== Action: Set Value ===================================
    id: 32901591978863780915
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: 'select APEX_PAGE_ID from PMS002_PAGE_MASTER where page_id = :P31_PAGE_ID'
      items-to-submit: 
      - P31_PAGE_ID
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P31_APEX_PAGE_ID

    execution: 
      sequence: 10
      event: New # 32901591813953780914
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: Cancel Dialog =======================
  id: 32916048937318242868
  identification: 
