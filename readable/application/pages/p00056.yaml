      --        P.PRICE,
      --        P.PROJECT_NAME,
      --        P.PROPERTY_NAME,
      --        P.PURPOSE,
      --        P.CREATED,
      --        P.CREATED_BY,
      --        P.UPDATED,
      --        P.UPDATED_BY,
      --        P.USER_ID,
      --        P.PROPERTY_CATEGORY,
      --        P.PROPERTY_UNITS,
      --        PS.STATUS_NAME,
      --        PC.PROPERTY_SUB_CATEGORY_NAME,
      --        PU.PROPERTY_UNITS_NAME,
      --        PT.PROPERTY_TYPE,
      --        P.AMENITIES
      --   from PMS002_PROPERTY P 
      --   INNER JOIN PMS002_PROPERTYSTATUSES PS ON P.STATUS_ID = PS.STATUS_ID
      --   INNER JOIN PMS002_PROPERTY_CATEGORY PC ON P.PROPERTY_CATEGORY = PC.PROPERTY_SUB_CATEGORY_ID
      --   INNER JOIN PMS002_PROPERTY_UNITS PU ON P.PROPERTY_UNITS = PU.PROPERTY_UNITS_ID
      --   INNER JOIN PMS002_PROPERTY_TYPES PT ON P.PROPERTY_TYPES_ID = PT.PROPERTY_TYPES_ID
      --   where PROPERTY_ID = :P56_PROPERTY_ID;
      
      
      
      
      
      SELECT pm.PROPERTY_ID,
             pm.AREA,
             pm.PROJECT_NAME,
             pm.PROJECT_DESCRIPTION,
             pm.LAUNCH_DATE,
             pm.HANDOVER_DATE,
             pm.PROPERTY_NAME,
             pm.PROPERTY_DESCRIPTION,
             pm.TOTAL_FLOORS,
             pm.FLOOR_NUMBER,
             pc.PROPERTY_CATEGORY_NAME,
             pt.PROPERTY_TYPE,
             pu.PROPERTY_UNITS_NAME,
          --    pm.PRICE,
             TO_CHAR(pm.PRICE, '999,99,99,999') AS PRICE,
             pm.ADDRESS,
             pm.CITY,
             pm.LAT_LONG,
             pm.LANDMARK,
           REGEXP_SUBSTR(PM.IMAGE_URL, '[^,]+', 1, 1) AS FIRST_IMAGE_URL,
             pp.PROPERTY_PURPOSE,
             ps.PROPERTY_AVAILABILITY_STATUS,
             pf.PROPERTY_FURNISHING_STATUS,
             pfd.PROPERTY_FACING_DIRECTION,
             pm.PROPERTY_AGE,
             pm.AMENITIES_TYPE,
          --    pm.LISTINGBY,
             pm.LISTING_FOR,
             pm.CREATED_AT,
             pm.CREATED_BY,
             pm.UPDATED_AT,
             pm.UPDATED_BY
      FROM PMS_PROPERTY_MASTER pm
      JOIN PMS_PROPERTY_CATEGORY pc ON pm.PROPERTY_CATEGORY = pc.PROPERTY_CATEGORY_ID
      JOIN PMS_PROPERTY_TYPE pt ON pt.PROPERTY_TYPE_ID = pm.PROPERTY_TYPE
      JOIN PMS_PROPERTY_UNITS pu ON pu.PROPERTY_UNITS_ID = pm.PROPERTY_UNITS
      JOIN PMS_PROPERTY_PURPOSE pp ON pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
      JOIN PMS_PROPERTY_STATUS ps ON ps.PROPERTY_AVAILABILITY_STATUS_ID = pm.PROPERTY_AVAILABILITY_STATUS
      JOIN PMS_PROPERTY_FURNISHING pf ON pf.PROPERTY_FURNISHING_ID = pm.PROPERTY_FURNISHING
      JOIN PMS_PROPERTY_FACING_DIRECTION pfd ON pfd.PROPERTY_FACING_DIRECTION_ID = pm.PROPERTY_FACING_DIRECTION
      
       where PROPERTY_ID = :P56_PROPERTY_ID;
      
    page-items-to-submit: 
    - P56_PROPERTY_ID

