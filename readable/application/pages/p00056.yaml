    settings: 
      language: PE.PROPERTY.SOURCE_SNIPPET_LANG.LOV.PLSQL.D
      pl/sql-code: |
        DECLARE
          l_user_id number := :user_id;
          l_ids     VARCHAR2(4000);
        
        BEGIN
          SELECT USER_FAVOURITE
          INTO l_ids
          FROM PMS_PROPERTY_MASTER
          WHERE PROPERTY_ID = :P56_PROPERTY_ID;
        
          -- Remove or add logic
          IF l_ids IS NULL THEN
            l_ids := l_user_id;
