            '</div>' ||
            '<div class="property-attribute">' ||
              '<div class="label">Purpose </div>' ||
              '<div class="value">' || l_purpose || '</div>' ||
            '</div>' ||
          '</div>';
      
        RETURN l_html;
      
      EXCEPTION
        WHEN NO_DATA_FOUND THEN
          RETURN '<p><strong>No property found.</strong></p>';
        WHEN OTHERS THEN
          RETURN '<p><strong>Error:</strong> ' || SQLERRM || '</p>';
