      DECLARE
        l_rent    VARCHAR2(100);
        l_purpose VARCHAR2(100);
        l_html    CLOB;
      BEGIN
        SELECT 
          -- pm.PRICE,
          TO_CHAR(pm.PRICE, '999,99,99,999') AS PRICE,
          pp.PROPERTY_PURPOSE
        INTO 
          l_rent,
          l_purpose
        FROM PMS_PROPERTY_MASTER pm
        JOIN PMS_PROPERTY_PURPOSE pp 
          ON pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
        WHERE pm.PROPERTY_ID = :P56_PROPERTY_ID;
      
