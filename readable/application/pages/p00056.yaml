- # ====== Region: Image =======================================
  id: 43383032758440106962
  identification: 
    name: Image
    type: APEX Lazy Image Swiper

  source: 
    sql-query: |
      SELECT
          'url' AS SRC_TYPE,
          TRIM(REGEXP_SUBSTR(pm.IMAGE_URL, '[^,]+', 1, rn.COLUMN_VALUE)) AS SRC_VALUE,
          -- 'Image Title ' || rn.COLUMN_VALUE AS SRC_TITLE,
          -- 'https://github.com/RonnyWeiss' AS LINK,
          3 AS DURATION
      FROM
          PMS_PROPERTY_MASTER pm,
          TABLE(
              CAST(
                  MULTISET(
                      SELECT LEVEL FROM DUAL
                      CONNECT BY LEVEL <= REGEXP_COUNT(pm.IMAGE_URL, ',') + 1
                  ) AS SYS.ODCINUMBERLIST
              )
          ) rn
      WHERE
          -- REGEXP_SUBSTR(pv.IMAGES_VIDEOS_UPLOAD, '[^,]+', 1, rn.COLUMN_VALUE) IS NOT NULL or
           property_id = :P56_PROPERTY_ID
    page-items-to-submit: 
