javascript: 
  function-and-global-variable-declaration: |
    document.addEventListener("DOMContentLoaded", function () {
    
      var imageString = $v("P56_IMAGE_URL"); // OR: $v("P1_IMAGE_URLS")
    
      var imageList = imageString.split(",");
    
      var currentIndex = 0;
    
      var imgTag = document.getElementById("slider-image");
     
      function showImage(index) {
    
        imgTag.style.opacity = 0;
    
        setTimeout(function () {
    
          imgTag.src = imageList[index].trim();
    
          imgTag.style.opacity = 1;
    
        }, 200);
    
      }
     
      showImage(currentIndex);
     
      document.querySelector(".next-btn").addEventListener("click", function (e) {
    
        e.preventDefault();
    
        currentIndex = (currentIndex + 1) % imageList.length;
    
        showImage(currentIndex);
    
      });
     
      document.querySelector(".prev-btn").addEventListener("click", function (e) {
    
        e.preventDefault();
    
        currentIndex = (currentIndex - 1 + imageList.length) % imageList.length;
    
        showImage(currentIndex);
    
      });
     
      setInterval(function () {
    
        currentIndex = (currentIndex + 1) % imageList.length;
    
        showImage(currentIndex);
    
      }, 3000);
    
    });
    
     
