- # ====== Dynamic Action: Zoom ================================
  id: 3754382970017697
  identification: 
    name: Zoom

  execution: 
    sequence: 20
    event-scope: Static

  when: 
    event: Page Load

  server-side-condition: 
    type: Never

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 3754442919017698
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        // Prevent zoom with Ctrl + MouseWheel (desktop)
        document.addEventListener('wheel', function(e) {
          if (e.ctrlKey) {
            e.preventDefault();
          }
        }, { passive: false });
        
        // Prevent zoom with pinch gesture (touch devices)
        document.addEventListener('touchstart', function(e) {
          if (e.touches.length > 1) {
            e.preventDefault();
          }
        }, { passive: false });
        
        document.addEventListener('gesturestart', function(e) {
          e.preventDefault();
        });
        

    execution: 
      sequence: 10
      event: Zoom # 3754382970017697
      fire-when-event-result-is: True
      fire-on-initialization: false

