- # ====== Page Item: P42_PROPERTY_UNITS =======================
  id: 18253450193480
  identification: 
    name: P42_PROPERTY_UNITS
    type: Select List

  label: 
    label: Property Units
    alignment: Left

  settings: 
    page-action-on-selection: None

  multiple-values: 
    type: No

  layout: 
    sequence: 60
    region: PMS PROPERTY FORM # 16032277193470
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: PMS_Optional_Above
    template-options: 
    - '#DEFAULT#'
    height: 1

  validation: 
    value-required: false

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT PROPERTY_UNITS_NAME AS DISPLAY_VALUE,
             PROPERTY_UNITS_ID AS RETURN_VALUE
      FROM PMS_PROPERTY_UNITS
      WHERE PROPERTY_UNITS_ID IN (
          SELECT TO_NUMBER(REGEXP_SUBSTR(PROPERTY_UNIT_ID, '[^,]+', 1, LEVEL))
          FROM PMS_PROPERTY_CATEGORY
          WHERE PROPERTY_CATEGORY_ID = :P42_PROPERTY_CATEGORY
          CONNECT BY REGEXP_SUBSTR(PROPERTY_UNIT_ID, '[^,]+', 1, LEVEL) IS NOT NULL
      )
      ORDER BY PROPERTY_UNITS_NAME;
      
    display-extra-values: true
    display-null-value: true

  cascading-list-of-values: 
    parent-item(s): 
    - P42_PROPERTY_CATEGORY
    items-to-submit: 
    - P42_PROPERTY_UNITS
    parent-required: true

