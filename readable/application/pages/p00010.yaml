validations: 
- # ====== Validation: Area greater than 0 =====================
  id: 36142582952505390144
  identification: 
    name: Area greater than 0

  execution: 
    sequence: 10

  validation: 
    type: Expression
    language: PL/SQL
    pl/sql-expression: ':P10_AREA > 0'
    always-execute: true

  error: 
    error-message: Area must be greater than 0.
    display-location: Inline with Field
    associated-item: P10_AREA # 30652158501625998320

  server-side-condition: 
    when-button-pressed: CREATE # 30652177543953998340

- # ====== Validation: max value ===============================
  id: 36142583073558390145
  identification: 
    name: max value

  execution: 
    sequence: 20

  validation: 
    type: Expression
