  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      -- DECLARE
      --   l_rent    VARCHAR2(100);
      --   l_purpose VARCHAR2(100);
      --   l_html    CLOB;
      -- BEGIN
      --   SELECT 
      --     pm.PRICE,
      --     pp.PROPERTY_PURPOSE
      --   INTO 
      --     l_rent,
      --     l_purpose
      --   FROM PMS_PROPERTY_MASTER pm
      --   JOIN PMS_PROPERTY_PURPOSE pp 
      --     ON pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
      --   WHERE pm.PROPERTY_ID = :P40_PROPERTY_ID;
      
      --   l_html := 
      --     '<p><strong>Rent/Price:</strong> ' || l_rent || '</p>' ||
      --     '<p><strong>Purpose:</strong> ' || l_purpose || '</p>';
      
      --   RETURN l_html;
      
      -- EXCEPTION
      --   WHEN NO_DATA_FOUND THEN
      --     RETURN '<p><strong>No property found.</strong></p>';
      --   WHEN OTHERS THEN
      --     RETURN '<p><strong>Error:</strong> ' || SQLERRM || '</p>';
      -- END;
      
      DECLARE
        l_rent    VARCHAR2(100);
        l_purpose VARCHAR2(100);
        l_html    CLOB;
      BEGIN
        SELECT 
          -- pm.PRICE,
          TO_CHAR(pm.PRICE, '999,99,99,999') AS PRICE,
          pp.PROPERTY_PURPOSE
        INTO 
          l_rent,
          l_purpose
        FROM PMS_PROPERTY_MASTER pm
        JOIN PMS_PROPERTY_PURPOSE pp 
          ON pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
        WHERE pm.PROPERTY_ID = :P40_PROPERTY_ID;
      
        l_html := 
          '<div class="property-details">' ||
            '<div class="property-attribute">' ||
              '<div class="label">Rent / Price </div>' ||
              '<div class="value">' || l_rent || '</div>' ||
            '</div>' ||
            '<div class="property-attribute">' ||
              '<div class="label">Purpose </div>' ||
              '<div class="value">' || l_purpose || '</div>' ||
            '</div>' ||
          '</div>';
      
        RETURN l_html;
      
      EXCEPTION
        WHEN NO_DATA_FOUND THEN
          RETURN '<p><strong>No property found.</strong></p>';
        WHEN OTHERS THEN
          RETURN '<p><strong>Error:</strong> ' || SQLERRM || '</p>';
      END;
