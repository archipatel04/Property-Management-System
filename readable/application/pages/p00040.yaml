    name: Map
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      -- DECLARE
      --   v_latlong VARCHAR2(100);
      -- BEGIN
      --   SELECT lat_long INTO v_latlong
      --   FROM pms_property_master
      --   WHERE property_id = :P40_PROPERTY_ID;
       
      --   -- Generate Map URL using latlong value
      --   htp.p('
      -- <iframe 
      --       width="100%" 
      --       height="450" 
      --       frameborder="0" 
      --       style="border:0" 
      --       loading="lazy"
      --       allowfullscreen
      --       referrerpolicy="no-referrer-when-downgrade"
      --       src="https://maps.google.com/maps?q=' || v_latlong || '&z=15&output=embed">
      -- </iframe>');
      -- END;
      
      DECLARE
        v_latlong VARCHAR2(100);
        v_html    CLOB;
      BEGIN
        SELECT lat_long INTO v_latlong
        FROM pms_property_master
        WHERE property_id = :P40_PROPERTY_ID;
      
        v_html := '
        <div class="map-container">
          <iframe 
            width="100%" 
            height="350" 
            frameborder="0" 
            style="border:0" 
            loading="lazy"
            allowfullscreen
            referrerpolicy="no-referrer-when-downgrade"
            src="https://maps.google.com/maps?q=' || v_latlong || '&z=15&output=embed">
          </iframe>
        </div>';
      
        RETURN v_html;
      EXCEPTION
        WHEN OTHERS THEN
          RETURN '<p><strong>Error loading map: </strong>' || SQLERRM || '</p>';
      END;
      
    page-items-to-submit: 
