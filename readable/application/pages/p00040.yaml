- # ====== Region: Overview ====================================
  id: 38248162181400600641
  identification: 
    name: Overview
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      -- DECLARE
      --   l_area               VARCHAR2(100);
      --   l_status_name        VARCHAR2(100);
      --   l_facing_direction   VARCHAR2(100);
      --   l_furnishing_status  VARCHAR2(100);
      --   l_property_category   VARCHAR2(100);
      --   l_property_units     VARCHAR2(100);
      --   l_property_type      VARCHAR2(100);
      --   l_html               CLOB;
      -- BEGIN
      --   -- Fetch required values
      --   SELECT 
      --      pm.AREA,
      --      ps.PROPERTY_AVAILABILITY_STATUS,
      --      pfd.PROPERTY_FACING_DIRECTION,
      --     pf.PROPERTY_FURNISHING_STATUS,
      --     pc.PROPERTY_CATEGORY_NAME,
      --     pu.PROPERTY_UNITS_NAME,
      --      pt.PROPERTY_TYPE
      --   INTO 
      --     l_area,
      --     l_status_name,
      --     l_facing_direction,
      --     l_furnishing_status,
      --     l_property_category,
      --     l_property_units,
      --     l_property_type
      -- FROM PMS_PROPERTY_MASTER pm
      -- JOIN PMS_PROPERTY_CATEGORY pc ON pm.PROPERTY_CATEGORY = pc.PROPERTY_CATEGORY_ID
      -- JOIN PMS_PROPERTY_TYPE pt ON pt.PROPERTY_TYPE_ID = pm.PROPERTY_TYPE
      -- JOIN PMS_PROPERTY_UNITS pu ON pu.PROPERTY_UNITS_ID = pm.PROPERTY_UNITS
      -- JOIN PMS_PROPERTY_PURPOSE pp ON pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
      -- JOIN PMS_PROPERTY_STATUS ps ON ps.PROPERTY_AVAILABILITY_STATUS_ID = pm.PROPERTY_AVAILABILITY_STATUS
      -- JOIN PMS_PROPERTY_FURNISHING pf ON pf.PROPERTY_FURNISHING_ID = pm.PROPERTY_FURNISHING
      -- JOIN PMS_PROPERTY_FACING_DIRECTION pfd ON pfd.PROPERTY_FACING_DIRECTION_ID = pm.PROPERTY_FACING_DIRECTION
      --   WHERE Pm.PROPERTY_ID = :P40_PROPERTY_ID;
      
      --   -- Build HTML output
      --   l_html := 
      --     '<p><strong>Area: </strong>' || l_area || ' sq.ft</p>' ||
      --     '<p><strong>Status: </strong>' || l_status_name || '</p>' ||
      --     '<p><strong>Facing Direction: </strong>' || l_facing_direction || '</p>' ||
      --     '<p><strong>Furnishing Status: </strong>' || l_furnishing_status || '</p>' ||
      --     '<p><strong>Property Type: </strong>' || l_property_type || '</p>' ||
      --     '<p><strong>Property Category: </strong>' || l_property_category || '</p>' ||
      --     '<p><strong>Property Units: </strong>' || l_property_units || '</p>';
      
      --   RETURN l_html;
      -- EXCEPTION
      --   WHEN NO_DATA_FOUND THEN
      --     RETURN '<p><strong>No property found.</strong></p>';
      --   WHEN OTHERS THEN
      --     RETURN '<p><strong>Error: </strong>' || SQLERRM || '</p>';
      -- END;
      
      DECLARE
        l_area               VARCHAR2(100);
        l_status_name        VARCHAR2(100);
        l_facing_direction   VARCHAR2(100);
        l_furnishing_status  VARCHAR2(100);
        l_property_category   VARCHAR2(100);
        l_property_units     VARCHAR2(100);
        l_property_type      VARCHAR2(100);
        l_html               CLOB;
      BEGIN
        -- Fetch required values
        SELECT 
           pm.AREA,
           ps.PROPERTY_AVAILABILITY_STATUS,
           pfd.PROPERTY_FACING_DIRECTION,
          pf.PROPERTY_FURNISHING_STATUS,
          pc.PROPERTY_CATEGORY_NAME,
          pu.PROPERTY_UNITS_NAME,
           pt.PROPERTY_TYPE
        INTO 
          l_area,
          l_status_name,
          l_facing_direction,
          l_furnishing_status,
          l_property_category,
          l_property_units,
          l_property_type
      FROM PMS_PROPERTY_MASTER pm
      JOIN PMS_PROPERTY_CATEGORY pc ON pm.PROPERTY_CATEGORY = pc.PROPERTY_CATEGORY_ID
      JOIN PMS_PROPERTY_TYPE pt ON pt.PROPERTY_TYPE_ID = pm.PROPERTY_TYPE
      JOIN PMS_PROPERTY_UNITS pu ON pu.PROPERTY_UNITS_ID = pm.PROPERTY_UNITS
      JOIN PMS_PROPERTY_PURPOSE pp ON pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
      JOIN PMS_PROPERTY_STATUS ps ON ps.PROPERTY_AVAILABILITY_STATUS_ID = pm.PROPERTY_AVAILABILITY_STATUS
      JOIN PMS_PROPERTY_FURNISHING pf ON pf.PROPERTY_FURNISHING_ID = pm.PROPERTY_FURNISHING
      JOIN PMS_PROPERTY_FACING_DIRECTION pfd ON pfd.PROPERTY_FACING_DIRECTION_ID = pm.PROPERTY_FACING_DIRECTION
        WHERE Pm.PROPERTY_ID = :P40_PROPERTY_ID;
      
      -- Build HTML output
      l_html := '<div class="property-overview" style="display:flex; flex-wrap:wrap; gap:20px; margin-top:20px;">' ||
                  '<div class="property-attribute" style="flex:1 1 30%; min-width:200px;">' ||
                    '<span class="label" style="display:block; font-weight:bold; color:#666; font-size:12px; text-transform:uppercase;">Area</span>' ||
                    '<span class="value" style="display:block; font-size:14px; font-weight:600;">' || l_area || ' sq.ft</span>' ||
                  '</div>' ||
      
                  '<div class="property-attribute" style="flex:1 1 30%; min-width:200px;">' ||
                    '<span class="label">Status</span>' ||
                    '<span class="value">' || l_status_name || '</span>' ||
                  '</div>' ||
      
                  '<div class="property-attribute" style="flex:1 1 30%; min-width:200px;">' ||
                    '<span class="label">Facing Direction</span>' ||
                    '<span class="value">' || l_facing_direction || '</span>' ||
                  '</div>' ||
      
                  '<div class="property-attribute" style="flex:1 1 30%; min-width:200px;">' ||
                    '<span class="label">Furnishing Status</span>' ||
                    '<span class="value">' || l_furnishing_status || '</span>' ||
                  '</div>' ||
      
                  '<div class="property-attribute" style="flex:1 1 30%; min-width:200px;">' ||
                    '<span class="label">Property Type</span>' ||
                    '<span class="value">' || l_property_type || '</span>' ||
                  '</div>' ||
      
                  '<div class="property-attribute" style="flex:1 1 30%; min-width:200px;">' ||
                    '<span class="label">Property Category</span>' ||
                    '<span class="value">' || l_property_category || '</span>' ||
                  '</div>' ||
      
                  '<div class="property-attribute" style="flex:1 1 30%; min-width:200px;">' ||
                    '<span class="label">Property Units</span>' ||
                    '<span class="value">' || l_property_units || '</span>' ||
                  '</div>' ||
                '</div>';
      
        RETURN l_html;
      EXCEPTION
        WHEN NO_DATA_FOUND THEN
          RETURN '<p><strong>No property found.</strong></p>';
        WHEN OTHERS THEN
          RETURN '<p><strong>Error: </strong>' || SQLERRM || '</p>';
      END;
