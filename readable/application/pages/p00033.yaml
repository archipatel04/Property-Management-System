- # ====== Region: Property Detail =============================
  id: 32901593909556780935
  identification: 
    name: Property Detail
    type: Cards

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      -- select PROPERTY_ID,
      --        PROPERTY_TYPES_ID,
      --        STATUS_ID,
      --        ADDRESS,
      --        PURCHASE_DATE,
      --        AREA,
      --        PROPERTY_AGE,
      --        FLOOR_NUMBER,
      --        TOTAL_FLOORS,
      --        FURNISHING_STATUS,
      --        FACING_DIRECTION,
      --        IMAGES_VIDEOS_UPLOAD,
      --        MAP_LOCATION,
      --        NEAR_BY_LOCATIONS,
      --        LAT_LONG,
      --        LANDMARK,
      --        LISTING_BY,
      --        PRICE,
      --        PROJECT_NAME,
      --        PEOPERTY_NAME,
      --        PURPOSE,
      --        CREATED,
      --        CREATED_BY,
      --        UPDATED,
      --        UPDATED_BY,
      --        USER_ID
      --   from PMS002_PROPERTY where property_id = :P33_PROPERTY_ID
      
      
      
      SELECT 
          P.PROPERTY_ID,
          P.PROPERTY_TYPES_ID,
          P.STATUS_ID,
          P.ADDRESS,
          P.PURCHASE_DATE,
          P.AREA,
          P.PROPERTY_AGE,
          P.FLOOR_NUMBER,
          P.TOTAL_FLOORS,
          P.FURNISHING_STATUS,
          P.FACING_DIRECTION,
          PT.PROPERTY_TYPE AS PROPERTY_TYPE,     
          PS.STATUS_NAME AS STATUS_NAME,
          P.MAP_LOCATION,
          P.NEAR_BY_LOCATIONS,    
          P.LAT_LONG,
          P.LANDMARK,
          P.LISTING_BY,
          P.PRICE,
          P.PROJECT_NAME,
          P.PROPERTY_NAME,
          P.PURPOSE
      FROM 
          PMS002_PROPERTY P
      LEFT JOIN 
          PMS002_PROPERTY_TYPES PT ON P.PROPERTY_TYPES_ID = PT.PROPERTY_TYPES_ID
      LEFT JOIN 
          PMS002_PROPERTYSTATUSES PS ON P.STATUS_ID = PS.STATUS_ID
      WHERE 
          P.PROPERTY_ID = :P33_PROPERTY_ID
      

  order-by: 
    type: None

  layout: 
    sequence: 30
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
