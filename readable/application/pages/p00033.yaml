        <div class="box">
            <div>
                <img src="https://content.jdmagicbox.com/v2/comp/mumbai/k1/022pxx22.xx22.220319091338.t5k1/catalogue/garden-gokuldham-society-aarey-milk-colony-goregaon-east-mumbai-vepl9tvfhf.jpg" >
            </div>
            <div>
