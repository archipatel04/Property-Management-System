      source: 
        location: Local Database
        type: SQL Query
        sql-query: |2
            SELECT
              PT.PROPERTY_TYPE,
              P.AREA,
              P.PRICE,
              P.ADDRESS,
              P.PROPERTY_ID AS ID,
              TO_NUMBER(:P33_LAT) AS latitude,
              TO_NUMBER(:P33_LONG) AS longitude,
              'Property ID: ' || P.PROPERTY_ID AS PROPERTY_NAME
          FROM PMS002_PROPERTY P, PMS002_PROPERTY_TYPES PT
          WHERE :P33_LAT IS NOT NULL AND :P33_LONG IS NOT NULL AND P.PROPERTY_ID = :P33_PROPERTY_ID AND PT.PROPERTY_TYPE = :P33_PROPERTY_TYPE
          
        page-items-to-submit: 
        - P33_LAT
        - P33_LONG
        - P33_PROPERTY_TYPE
        use-spatial-index: false

      column-mapping: 
        geometry-column-data-type: Longitude/Latitude
        longitude-column: LONGITUDE
        latitude-column: LATITUDE

