- # ====== Region: Property ====================================
  id: 30652179719379998343
  identification: 
    name: Property
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select P.PROPERTY_ID,
             P.PROPERTY_TYPES_ID,
             P.STATUS_ID,
             P.PROPERTY_NAME,
             P.ADDRESS,
             P.PURCHASE_DATE,
             P.AREA,
             P.PROPERTY_AGE,
             P.FLOOR_NUMBER,
             P.TOTAL_FLOORS,
             P.FURNISHING_STATUS,
             P.FACING_DIRECTION,
             P.IMAGES_VIDEOS_UPLOAD,
             P. MAP_LOCATION,
             P.NEAR_BY_LOCATIONS,
             P.LAT_LONG,
             TRIM(SUBSTR(p.LAT_LONG, 1, INSTR(LAT_LONG, ',') - 1)) AS LAT_VAL,
             TRIM(SUBSTR(p.LAT_LONG, INSTR(LAT_LONG, ',') + 1)) AS LNG_VAL,
             P.LANDMARK,
             P.LISTING_BY,
             P.PRICE,
             P.PROJECT_NAME,
          --    P.PEOPERTY_NAME,
             P.PURPOSE,
             CASE P.PURPOSE
          WHEN 'Sale' THEN 'success'
          WHEN 'Rent' THEN 'warning'
        END AS PURPOSE_1,
             P.CREATED,
             P.CREATED_BY,
             P.UPDATED,
             P.UPDATED_BY,
             P.USER_ID,
             U.NAME
        from PMS002_PROPERTY P, PMS002_USERS U WHERE U.USERID = P.USER_ID

  layout: 
    sequence: 20
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: false
    column: Automatic
    new-column: true
    column-span: Automatic

