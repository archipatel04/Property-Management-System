- # ====== Region: New =========================================
  id: 14170621525778872
  identification: 
    name: New
    type: Dynamic Content

  source: 
    language: PL/SQL
    pl/sql-function-body-returning-a-clob: |
      BEGIN
        DECLARE
          l_html CLOB := '<div class="builder-slider">';
          l_url  VARCHAR2(4000);
        BEGIN
          FOR rec IN (
            SELECT 
                u.user_id,
                u.first_name || ' ' || u.last_name AS full_name,
                COUNT(DISTINCT pm.property_id) AS total_properties
            FROM 
                pms_users u
            JOIN 
                PMS_USER_ROLE_ACCESS_MASTER uram ON uram.user_id = u.user_id
            JOIN 
                pms_property_master pm 
                ON u.user_id IN (pm.listing_by, pm.listing_for)
            WHERE 
                uram.role_id = 6
            GROUP BY 
                u.user_id, u.first_name, u.last_name
            ORDER BY 
                total_properties desc
          ) LOOP
      
            -- 🔗 Safe link generation using APEX_UTIL
            l_url := APEX_UTIL.PREPARE_URL(
              p_url => 'f?p=' || :APP_ID || ':72:' || :APP_SESSION || '::NO::P72_USER_ID:' || rec.user_id
            );
      
            -- 🧱 Card HTML
            l_html := l_html || 
              '<a href="' || l_url || '" class="builder-card" style="text-decoration:none; color:inherit;">
                  <div class="builder-name">' || rec.full_name || '</div>
                  <div class="builder-info">' || rec.total_properties || ' Total Properties</div>
               </a>';
          END LOOP;
      
          l_html := l_html || '</div>';
      
          -- Output HTML
          HTP.P(l_html);
        END;
      END;
      

  layout: 
    sequence: 180
    parent-region: No Parent
