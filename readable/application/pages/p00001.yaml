- # ====== Dynamic Action: current location ====================
  id: 44024581103129650718
  identification: 
    name: current location

  execution: 
    sequence: 180
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: CurrentLocation # 44024581004593650717

  actions: 
  - # ====== Action: Execute JavaScript Code =====================
    id: 44024581201689650719
    identification: 
      action: Execute JavaScript Code

    settings: 
      code: |
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(function(position) {
            apex.item("P1_USER_LAT").setValue(position.coords.latitude);
            apex.item("P1_USER_LON").setValue(position.coords.longitude);
            apex.event.trigger(document, "locationReady");
          });
        }

    execution: 
      sequence: 10
      event: current location # 44024581103129650718
      fire-when-event-result-is: True
      fire-on-initialization: false

