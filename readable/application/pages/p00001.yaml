- # ====== Region: Card ========================================
  id: 37235242822678605340
  identification: 
    name: Card
    type: Cards

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      -- SELECT 
      --     P.PROPERTY_ID,
      --     P.PROPERTY_TYPE,
      --     -- P.PROPERTY_AVAILABILITY_STATUS,
      --     P.ADDRESS,
      --     P.CITY,
      --     P.LAUNCH_DATE,
      --     P.HANDOVER_DATE,
      --     P.AREA,
      --     P.PROPERTY_AGE,
      --     P.FLOOR_NUMBER,
      --     P.TOTAL_FLOORS,
      --     P.PROPERTY_FURNISHING,
      --     P.PROPERTY_FACING_DIRECTION,
      --     P.IMAGE_URL,
      --     REGEXP_SUBSTR(P.IMAGE_URL, '[^,]+', 1, 1) AS FIRST_IMAGE_URL,
      --     -- NULL AS MAP_LOCATION, -- no column for this in the new table
      --     -- NULL AS NEAR_BY_LOCATIONS, -- no column in current table
      --     P.LAT_LONG,
      --     P.LANDMARK,
      --     P.LISTING_BY,
      --     P.PRICE,
      --     P.PROJECT_NAME,
      --     P.PROJECT_DESCRIPTION,
      --     P.PROPERTY_NAME,
      --     P.PROPERTY_DESCRIPTION,
      --     P.PROPERTY_PURPOSE,
      --     P.CREATED_AT AS CREATED,
      --     P.CREATED_BY,
      --     P.UPDATED_AT AS UPDATED,
      --     P.UPDATED_BY,
      --     P.LISTING_FOR,
      --     -- P.PROPERTY_CATEGORY,
      --     -- P.PROPERTY_UNITS,
      --     PS.PROPERTY_AVAILABILITY_STATUS,
      --     PC.PROPERTY_CATEGORY_NAME,
      --     PU.PROPERTY_UNITS_NAME
      
      -- FROM PMS_PROPERTY_MASTER P
      -- INNER JOIN PMS_PROPERTY_STATUS PS 
      --     ON P.PROPERTY_AVAILABILITY_STATUS = PS.PROPERTY_AVAILABILITY_STATUS_ID
      -- INNER JOIN PMS_PROPERTY_CATEGORY PC 
      --     ON P.PROPERTY_CATEGORY = PC.PROPERTY_CATEGORY_ID
      -- INNER JOIN PMS_PROPERTY_UNITS PU 
      --     ON P.PROPERTY_UNITS = PU.PROPERTY_UNITS_ID
      
      -- WHERE (:P1_PROPERTY_TYPE IS NULL OR :P1_PROPERTY_TYPE = P.PROPERTY_TYPE)
      --   AND (:P1_FURNISHING_STATUS IS NULL OR :P1_FURNISHING_STATUS = P.PROPERTY_FURNISHING)
      --   AND (:P1_FACING_DIRECTION IS NULL OR :P1_FACING_DIRECTION = P.PROPERTY_FACING_DIRECTION)
      --   AND (:P1_PURPOSE IS NULL OR :P1_PURPOSE = P.PROPERTY_PURPOSE)
      --   AND (:P1_PROPERTY_AGE IS NULL OR :P1_PROPERTY_AGE = P.PROPERTY_AGE)
      --   AND (:P1_PRICE IS NULL OR :P1_PRICE = P.PRICE)
      --   AND (:P1_PROPERTY_STATUS IS NULL OR :P1_PROPERTY_STATUS = P.PROPERTY_AVAILABILITY_STATUS)
      --   AND (:P1_FLOORS IS NULL OR :P1_FLOORS = P.TOTAL_FLOORS)
      --   AND (:P1_POSTED_BY IS NULL OR :P1_POSTED_BY = P.LISTING_BY)
      --   AND LOWER(ADDRESS || ' ' || PROPERTY_NAME || ' ' || LANDMARK) 
      --       LIKE '%' || LOWER(COALESCE(:P1_SEARCH, '')) || '%'
      -- AND (
      --   :P1_USER_LAT IS NULL OR :P1_USER_LON IS NULL
      --   OR (
      --     6371 * ACOS(
      --       COS(:P1_USER_LAT * 3.141592653589793 / 180) *
      --       COS(TO_NUMBER(REGEXP_SUBSTR(p.LAT_LONG, '[^,]+', 1, 1)) * 3.141592653589793 / 180) *
      --       COS(
      --         (TO_NUMBER(REGEXP_SUBSTR(p.LAT_LONG, '[^,]+', 1, 2)) - :P1_USER_LON) * 3.141592653589793 / 180
      --       ) +
      --       SIN(:P1_USER_LAT * 3.141592653589793 / 180) *
      --       SIN(TO_NUMBER(REGEXP_SUBSTR(p.LAT_LONG, '[^,]+', 1, 1)) * 3.141592653589793 / 180)
      --     ) <= 5
      --   )
      -- )
      
      
      
      SELECT pm.PROPERTY_ID,
             pm.AREA,
             pm.PROJECT_NAME,
             pc.PROPERTY_CATEGORY_NAME,
             pt.PROPERTY_TYPE,
             pu.PROPERTY_UNITS_NAME,
             pm.PRICE,
             pm.HANDOVER_DATE,
             pm.ADDRESS,
             pm.CITY,
             pm.LAT_LONG,
             pm.LANDMARK,
          --    pm.IMAGE_URL,
           REGEXP_SUBSTR(PM.IMAGE_URL, '[^,]+', 1, 1) AS FIRST_IMAGE_URL,
             pp.PROPERTY_PURPOSE,
             ps.PROPERTY_AVAILABILITY_STATUS,
             pf.PROPERTY_FURNISHING_STATUS,
             pfd.PROPERTY_FACING_DIRECTION,
             pm.PROPERTY_AGE,
             pm.AMENITIES_TYPE
          --    pm.LISTINGBY,
          --    pm.LISTING_FOR,
          --    pm.CREATED_AT,
          --    pm.CREATED_BY,
          --    pm.UPDATED_AT,
          --    pm.UPDATED_BY
      FROM PMS_PROPERTY_MASTER pm
      -- JOIN pms_users u ON u.user_id = pm.listingby
      -- JOIN PMS_USER_ROLE_ACCESS_MASTER ur ON ur.user_id = u.user_id
      JOIN PMS_PROPERTY_CATEGORY pc ON pm.PROPERTY_CATEGORY = pc.PROPERTY_CATEGORY_ID
      JOIN PMS_PROPERTY_TYPE pt ON pt.PROPERTY_TYPE_ID = pm.PROPERTY_TYPE
      JOIN PMS_PROPERTY_UNITS pu ON pu.PROPERTY_UNITS_ID = pm.PROPERTY_UNITS
      JOIN PMS_PROPERTY_PURPOSE pp ON pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
      JOIN PMS_PROPERTY_STATUS ps ON ps.PROPERTY_AVAILABILITY_STATUS_ID = pm.PROPERTY_AVAILABILITY_STATUS
      JOIN PMS_PROPERTY_FURNISHING pf ON pf.PROPERTY_FURNISHING_ID = pm.PROPERTY_FURNISHING
      JOIN PMS_PROPERTY_FACING_DIRECTION pfd ON pfd.PROPERTY_FACING_DIRECTION_ID = pm.PROPERTY_FACING_DIRECTION
      
      WHERE (:P1_PROPERTY_TYPE IS NULL OR pm.PROPERTY_TYPE = :P1_PROPERTY_TYPE)
        AND (:P1_PURPOSE IS NULL OR pm.PROPERTY_PURPOSE = :P1_PURPOSE)
        AND (:P1_PROPERTY_STATUS IS NULL OR pm.PROPERTY_AVAILABILITY_STATUS = :P1_PROPERTY_STATUS)
        AND (:P1_FURNISHING_STATUS IS NULL OR pm.PROPERTY_FURNISHING = :P1_FURNISHING_STATUS)
        AND (:P1_FACING_DIRECTION IS NULL OR pm.PROPERTY_FACING_DIRECTION = :P1_FACING_DIRECTION)
        AND LOWER(pm.ADDRESS || ' ' || pm.LANDMARK || ' ' || pm.CITY) 
            LIKE '%' || LOWER(COALESCE(:P1_SEARCH, '')) || '%'
        AND (
        (:P1_USER_LAT IS NULL OR :P1_USER_LON IS NULL)
        OR (
          6371 * ACOS(
              COS(:P1_USER_LAT * 3.141592653589793 / 180) *
              COS(TO_NUMBER(REGEXP_SUBSTR( pm.LAT_LONG, '[^,]+', 1, 1)) * 3.141592653589793 / 180) *
              COS(
                (TO_NUMBER(REGEXP_SUBSTR( pm.LAT_LONG, '[^,]+', 1, 2)) - :P1_USER_LON)
                * 3.141592653589793 / 180
              ) +
              SIN(:P1_USER_LAT * 3.141592653589793 / 180) *
              SIN(TO_NUMBER(REGEXP_SUBSTR( pm.LAT_LONG, '[^,]+', 1, 1)) * 3.141592653589793 / 180)
          ) <= 5
        )
      )
      
      ORDER BY pm.PROPERTY_ID ASC;
      
    page-items-to-submit: 
