dynamic-actions: 
- # ====== Dynamic Action: New =================================
  id: 34273845057794725201
  identification: 
    name: New

  execution: 
    sequence: 10
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P5_TO_USER_ID

  actions: 
  - # ====== Action: Set Value ===================================
    id: 34273845147770725202
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: 'select last_name from pms_users where user_id = :P5_TO_USER_ID;'
      items-to-submit: 
      - P5_TO_USER_ID
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P5_TO_USER_NAME

    execution: 
      sequence: 10
      event: New # 34273845057794725201
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

  - # ====== Action: Set Value ===================================
    id: 34273845562500725206
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: 'select email from pms_users where user_id = :P5_TO_USER_ID;'
      items-to-submit: 
      - P5_TO_USER_ID
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P5_EMAIL

    execution: 
      sequence: 20
      event: New # 34273845057794725201
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

processes: 
- # ====== Process: New ========================================
  id: 14592944498345095
  identification: 
    name: New
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      insert into PMS_APPOINTMENT(
          FROM_TYPE,
          FROM_USER_ID,
          TO_TYPE,
          TO_USER_ID,
          APPOINTMENT_DATE,
          APPOINTMENT_TIME,
          LOCATION,
          STATUS,
          PROPERTY_ID,
          CREATED_AT,
          CREATED_BY,
          UPDATED_AT,
          UPDATE_BY
      ) values
      (
          :P5_FROM_TYPE,
          :P5_FROM_USER_ID,
          :P5_TO_TYPE,
          :P5_TO_USER_ID,
          :P5_APPOINTMENT_DATE,
          :P5_APPOINTMENT_TIME,
          :P5_LOCATION,
          :P5_STATUS,
          :P5_PROPERTY_ID,
          :P5_CREATED_AT,
          :P5_CREATED_BY,
          :P5_UPDATED_AT,
          :P5_UPDATE_BY
      );

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: 'Appointment Booked! '

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: CREATE # 33970703618580858925

- # ====== Process: Email Sending ==============================
  id: 32901595330285780949
  identification: 
    name: Email Sending
    type: Send E-Mail
    execution-chain: None

  settings: 
    from: '&APP_EMAIL.'
    to: jenigaming8080@gmail.com
    subject: New Appointment Request
    body-plain-text: |
      Dear &P5_TO_USER_NAME.,
      
      A new appointment has been scheduled by &P5_FROM_USER_NAME. for your property.
      
      📅 Date: &P5_APPOINTMENT_DATE.  
      ⏰ Time: &P5_APPOINTMENT_TIME. 
      👤 Tenant: &P5_FROM_USER_NAME. 
      🏠 Property: &P5_LOCATION.
      
