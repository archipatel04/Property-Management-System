  attributes: 
    id: 14678911069553846
    appearance: 
      layout: Grid
      grid-columns: 3 Columns

    title: 
      advanced-formatting: true
      html-expression: |
        <!-- <img src="&IMAGES_VIDEOS_UPLOAD." style="width:100%; height:200px"> -->
        <!-- <img src="&IMAGES_VIDEOS_UPLOAD." style="width:100%; height:100% object-fit:cover;"> -->
        <!-- <img src="&IMAGES_VIDEOS_UPLOAD." style="width:100%; max-height:200px; object-fit:cover;"> -->
        <img src="&FIRST_IMAGE_URL." style="width:100%; max-height:200px; object-fit:cover;">
        

    subtitle: 
      advanced-formatting: false

    body: 
      advanced-formatting: true
