        <strong> &PROPERTY_UNITS_NAME. , &PROPERTY_CATEGORY_NAME. for &PURPOSE. in &ADDRESS. </strong>
        <p> 📍 &ADDRESS.</p>
        <strong> INR &PRICE.</strong>
        <p> 🏚️ &PROPERTY_AVAILABILITY_STATUS.</p>
        <p> &AREA. (sq.ft)</p>
        
        
        

    secondary-body: 
