  execution: 
    sequence: 50
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: Accept # 35148798917869005505

- # ====== Process: Format Appointment Date ====================
  id: 36142580457037390119
  identification: 
    name: Format Appointment Date
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      BEGIN
        IF :P6_APPOINTMENT_DATE IS NOT NULL THEN
          -- Assume it is stored as date or string in YYYY-MM-DD
          :P6_APPOINTMENT_DATE := TO_CHAR(TO_DATE(:P6_APPOINTMENT_DATE, 'MM-DD-YYYY'), 'DD-MON-YYYY');
        END IF;
      END;
      

  execution: 
    sequence: 10
    point: Before Header
    run-process: Once Per Page Visit (default)

  server-side-condition: 
    when-button-pressed: Accept # 35148798917869005505

