      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

processes: 
- # ====== Process: New ========================================
  id: 35148799570744005511
  identification: 
    name: New
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: "update pms_appointment set status = 'Accept' where appointment_id = :P6_APPOINTMENT_ID;"

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: Accept # 35148798917869005505

- # ====== Process: email sending ==============================
  id: 35148801571040005531
  identification: 
    name: email sending
    type: Send E-Mail
    execution-chain: None

  settings: 
    from: '&P6_FROM.'
    to: archipatel2632004@gmail.com
    subject: Appointment Acceptance
    body-plain-text: |
      Dear &P6_TO.,
      
      We are pleased to confirm your appointment for the property viewing.
      
      Details of the Appointment:
      
      Property Address: &P6_LOCATION.
      
      Date: &P6_APPOINTMENT_DATE.
      
      Time: &P6_APPOINTMENT_TIME.
      
      Please ensure you arrive on time. If you need to reschedule or have any questions before the appointment, feel free to contact us.
      
      We look forward to meeting you!
      
      Best regards,
      &P6_FROM.
    send-immediately: false

  execution: 
    sequence: 30
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: Appointment Accepted

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: Accept # 35148798917869005505
    type: Never

- # ====== Process: push notification ==========================
  id: 35148801847322005534
  identification: 
    name: push notification
    type: Send Push Notification
    execution-chain: None

  settings: 
    to: '&P6_FROM_EMAIL.'
    title: Appointment Accepted
    body: |
      Appointment is Accepted for scheduled Location/Property.
      Date : &P6_APPOINTMENT_DATE.
      Time : &P6_APPOINTMENT_TIME.
      Location : &P6_LOCATION.

  execution: 
    sequence: 40
    point: Processing
    run-process: Once Per Page Visit (default)

  success-message: 
    success-message: notification sent

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: Accept # 35148798917869005505

