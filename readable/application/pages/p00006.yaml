    - P6_FROM_USER_ID

  configuration: 
    build-option: Commented Out # 30584983782671713301

  actions: 
  - # ====== Action: Set Value ===================================
    id: 35148801403156005530
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: 'select upper(email) from pms_users where user_id = :P6_USER_ID;'
      items-to-submit: 
      - P6_FROM_USER_ID
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P6_FROM_EMAIL

    execution: 
      sequence: 10
