validations: 
- # ====== Validation: validate name ===========================
  id: 37034156132117859101
  identification: 
    name: validate name

  execution: 
    sequence: 10

  validation: 
    type: Item matches Regular Expression
    item: P14_NAME
    regular-expression: ^[A-Za-z\s]+$
    always-execute: true

  error: 
    error-message: Name must contain only letters and spaces.
    display-location: Inline with Field
    associated-item: P14_NAME # 32906966301164812227

  server-side-condition: 
    when-button-pressed: CREATE # 32906977253558812237

- # ====== Validation: validate email ==========================
  id: 37034156212216859102
  identification: 
    name: validate email

  execution: 
    sequence: 20

  validation: 
    type: Item matches Regular Expression
    item: P14_EMAIL
    regular-expression: ^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$
    always-execute: true

  error: 
    error-message: Please enter a valid email address.
    display-location: Inline with Field
    associated-item: P14_EMAIL # 32906966753488812227

  server-side-condition: 
    when-button-pressed: CREATE # 32906977253558812237

- # ====== Validation: validate number =========================
  id: 37034156341164859103
  identification: 
    name: validate number

  execution: 
    sequence: 30

  validation: 
    type: Item matches Regular Expression
    item: P14_PHONE
    regular-expression: ^\d{10}$
    always-execute: true

  error: 
    error-message: Phone number must be exactly 10 digits.
    display-location: Inline with Field
    associated-item: P14_PHONE # 32906967128445812228

  server-side-condition: 
    when-button-pressed: CREATE # 32906977253558812237

- # ====== Validation: validate password =======================
  id: 37034156422172859104
  identification: 
    name: validate password

  execution: 
    sequence: 40

  validation: 
    type: Item matches Regular Expression
    item: P14_PASSWORD
    regular-expression: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$
    always-execute: true

  error: 
    error-message: Password must be at least 8 characters, include uppercase, lowercase, and a number.
    display-location: Inline with Field
    associated-item: P14_PASSWORD # 32906967523521812228

  server-side-condition: 
    when-button-pressed: CREATE # 32906977253558812237

