- # ====== Region: Appointment Status ==========================
  id: 34273849199528725242
  identification: 
    name: Appointment Status
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      -- select a.APPOINTMENT_ID,
      --        a.FROM_TYPE,
      --        a.FROM_USER_ID,
      --        a.TO_TYPE,
      --        a.TO_USER_ID,
      --        a.APPOINTMENT_DATE,
      --        a.APPOINTMENT_TIME,
      --        a.LOCATION,
      --        a.STATUS,
      --        u.last_name as Name,
      --        r.role_name
      --   from PMS_APPOINTMENT a 
      --   join pms_users u on a.FROM_USER_ID = u.user_id 
      --   join pms_roles r on a.FROM_type = r.role_id
      --   where  a.to_user_id = :user_id and a.status not in ('Pending')
      --   order by a.appointment_date desc, a.appointment_time
      
      
      
      SELECT 
          a.APPOINTMENT_ID,
          a.FROM_TYPE,
          a.FROM_USER_ID,
          a.TO_TYPE,
          a.TO_USER_ID,
          a.APPOINTMENT_DATE,
          a.APPOINTMENT_TIME,
          a.LOCATION,
          a.STATUS,
          u.last_name AS Name,
          r.role_name,
          CASE 
              WHEN a.STATUS = 'Approved' THEN 
                  '<span class="t-Badge t-Badge--success">Approved</span>'
              WHEN a.STATUS = 'Rejected' THEN 
                  '<span class="t-Badge t-Badge--danger">Rejected</span>'
              ELSE 
                  '<span class="t-Badge t-Badge--neutral">' || a.STATUS || '</span>'
          END AS STATUS_BADGE
      FROM PMS_APPOINTMENT a 
      JOIN pms_users u ON a.FROM_USER_ID = u.user_id 
      JOIN pms_roles r ON a.FROM_type = r.role_id
      WHERE a.to_user_id = :user_id 
        AND a.status NOT IN ('Pending')
      ORDER BY a.appointment_date DESC, a.appointment_time
      

  order-by: 
    type: None

  layout: 
    sequence: 40
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

