processes: 
- # ====== Process: insert sigup ===============================
  id: 43347418593252419099
  identification: 
    name: insert sigup
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE 
          V_USER_ID NUMBER;
      BEGIN
      
          INSERT INTO PMS_USERS(
              FIRST_NAME,
              LAST_NAME,
              EMAIL,
              PHONE_NUMBER,
              ADDRESS,
              STATE,
              CITY,
              PASSWORD,
              STATUS,
              REGISTRATIONDATE,
              USER_IMAGE,
              CREATED_AT,
              CREATED_BY,
              UPDATED_AT,
              UPDATED_BY
          ) VALUES(
              :P69_FIRST_NAME,
              :P69_LAST_NAME,
              LOWER(:P69_EMAIL),
              :P69_PHONE_NUMBER,
              :P69_ADDRESS,
              :P69_STATE,
              :P69_CITY,
              :P69_PASSWORD,
              'Active',
              SYSDATE,
              :P69_USER_IMAGE,
              SYSDATE,
              :APP_USER,
              SYSDATE,
              :APP_USER
          )
      
          RETURNING USER_ID into V_USER_ID;
      
          INSERT INTO PMS_USER_ROLE_ACCESS_MASTER(
              USER_ID,
              ROLE_ID,
              CREATED_BY,
              CREATED,
