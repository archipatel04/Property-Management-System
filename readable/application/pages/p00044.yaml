  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      -- select "PROPERTY_ID",
      --        "PROPERTY_TYPES_ID",
      --        ( select l1."PROPERTY_TYPE" from "PMS002_PROPERTY_TYPES" l1 where l1."PROPERTY_TYPES_ID" = m."PROPERTY_TYPES_ID") "PROPERTY_TYPES_ID_L$1",
      --        "STATUS_ID",
      --        ( select l2."ROW_KEY" from "PMS002_PROPERTYSTATUSES" l2 where l2."STATUS_ID" = m."STATUS_ID") "STATUS_ID_L$2",
      --        "ADDRESS",
      --        "PURCHASE_DATE",
      --        "AREA",
      --        "PROPERTY_AGE",
      --        "FLOOR_NUMBER",
      --        "TOTAL_FLOORS",
      --        "FURNISHING_STATUS",
      --        "FACING_DIRECTION",
      --        "IMAGES_VIDEOS_UPLOAD",
      --        "MAP_LOCATION",
      --        "NEAR_BY_LOCATIONS",
      --        "LAT_LONG",
      --        "LANDMARK",
      --        "LISTING_BY",
      --        "PRICE",
      --        "PROJECT_NAME",
      --        "PROPERTY_NAME",
      --        "PURPOSE",
      --        "CREATED",
      --        "CREATED_BY",
      --        "UPDATED",
      --        "UPDATED_BY",
      --        "USER_ID",
      --        "PROPERTY_CATEGORY",
      --        ( select l3."PROPERTY_SUB_CATEGORY_NAME" from "PMS002_PROPERTY_CATEGORY" l3 where l3."PROPERTY_SUB_CATEGORY_ID" = m."PROPERTY_CATEGORY") "PROPERTY_CATEGORY_L$3",
      --        "PROPERTY_UNITS",
      --        ( select l4."PROPERTY_UNITS_NAME" from "PMS002_PROPERTY_UNITS" l4 where l4."PROPERTY_UNITS_ID" = m."PROPERTY_UNITS") "PROPERTY_UNITS_L$4",
      --        "AMENITIES"
      -- from "PMS002_PROPERTY" m
      
      SELECT 
          P.PROPERTY_ID,
          P.PROPERTY_TYPE,
          P.PROPERTY_AVAILABILITY_STATUS,
          P.ADDRESS,
          P.LAUNCH_DATE,
          P.HANDOVER_DATE,
          P.AREA,
          P.PROPERTY_AGE,
          P.FLOOR_NUMBER,
          P.TOTAL_FLOORS,
          P.PROPERTY_FURNISHING,
          P.PROPERTY_FACING_DIRECTION,
          P.IMAGE_URL,
          REGEXP_SUBSTR(P.IMAGE_URL, '[^,]+', 1, 1) AS FIRST_IMAGE_URL,
          P.CITY,
          P.LAT_LONG,
          P.LANDMARK,
          P.LISTING_BY,
          P.PRICE,
          P.PROJECT_NAME,
          P.PROJECT_DESCRIPTION,
          P.PROPERTY_NAME,
          P.PROPERTY_DESCRIPTION,
          P.PROPERTY_PURPOSE,
          P.CREATED_AT,
          P.CREATED_BY,
          P.UPDATED_AT,
          P.UPDATED_BY,
          P.LISTING_FOR,
          P.PROPERTY_CATEGORY,
          P.PROPERTY_UNITS,
          PS.PROPERTY_AVAILABILITY_STATUS AS STATUS,
          PC.PROPERTY_CATEGORY_NAME,
          PU.PROPERTY_UNITS_NAME,
          PF.PROPERTY_FURNISHING_STATUS,
          FD.PROPERTY_FACING_DIRECTION AS DIRECTION
      
      FROM PMS_PROPERTY_MASTER P 
      INNER JOIN PMS_PROPERTY_STATUS PS ON P.PROPERTY_AVAILABILITY_STATUS = PS.PROPERTY_AVAILABILITY_STATUS_ID
      INNER JOIN PMS_PROPERTY_CATEGORY PC ON P.PROPERTY_CATEGORY = PC.PROPERTY_CATEGORY_ID
      INNER JOIN PMS_PROPERTY_UNITS PU ON P.PROPERTY_UNITS = PU.PROPERTY_UNITS_ID
      INNER JOIN PMS_PROPERTY_FURNISHING PF ON P.PROPERTY_FURNISHING = PF.PROPERTY_FURNISHING_ID
      INNER JOIN PMS_PROPERTY_FACING_DIRECTION FD ON P.PROPERTY_FACING_DIRECTION = FD.PROPERTY_FACING_DIRECTION_ID
      
      WHERE (:P1_PROPERTY_TYPE IS NULL OR :P1_PROPERTY_TYPE = P.PROPERTY_TYPE)
        AND (:P1_FURNISHING_STATUS IS NULL OR :P1_FURNISHING_STATUS = P.PROPERTY_FURNISHING)
        AND (:P1_FACING_DIRECTION IS NULL OR :P1_FACING_DIRECTION = P.PROPERTY_FACING_DIRECTION)
        AND (:P1_PURPOSE IS NULL OR :P1_PURPOSE = P.PROPERTY_PURPOSE)
        AND (:P1_PROPERTY_AGE IS NULL OR :P1_PROPERTY_AGE = P.PROPERTY_AGE)
        AND (:P1_PRICE IS NULL OR :P1_PRICE = P.PRICE)
        AND (:P1_PROPERTY_STATUS IS NULL OR :P1_PROPERTY_STATUS = P.PROPERTY_AVAILABILITY_STATUS)
        AND (:P1_FLOORS IS NULL OR :P1_FLOORS = P.TOTAL_FLOORS)
        AND (:P1_POSTED_BY IS NULL OR :P1_POSTED_BY = P.LISTING_BY) 
        AND LOWER(ADDRESS || ' ' || PROPERTY_NAME || ' ' || LANDMARK || ' ' || CITY) 
            LIKE '%' || LOWER(COALESCE(:P1_SEARCH, '')) || '%'
        AND LISTING_FOR = :USER_ID
        
      -- select * from pms002_property where user_id = :user_id;

