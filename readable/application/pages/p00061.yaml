- # ====== Region: APPROVAL REPORT =============================
  id: 14607614457836709
  identification: 
    name: APPROVAL REPORT
    type: Interactive Grid

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select a.APPOINTMENT_ID,
             a.FROM_TYPE,
             a.FROM_USER_ID,
             a.TO_TYPE,
             a.TO_USER_ID,
             a.APPOINTMENT_DATE,
             a.APPOINTMENT_TIME,
             a.LOCATION,
             a.STATUS,
             CASE 
              WHEN a.STATUS = 'Approved' THEN 
                  '<span class="t-Badge t-Badge--success">Approved</span>'
              ELSE 
                  '<span class="t-Badge t-Badge--neutral">' || a.STATUS || '</span>'
              END AS STATUS_BADGE,
             u.last_name,
             r.role_name
          --       -- Button Link Column
          -- '<a class="action-button" ' ||
          -- 'href="' || 
          --   APEX_UTIL.PREPARE_URL(
          --      'f?p=&APP_ID.:62:&APP_SESSION.::NO::P62_APPOINTMENT_ID1:' || a.APPOINTMENT_ID
          --   ) ||
          -- '">Action</a>' AS ACTION_BUTTON
        from PMS_APPOINTMENT a 
        join pms_users u on a.FROM_USER_ID = u.user_id 
        join pms_roles r on a.FROM_type = r.role_id
        where  a.to_user_id = :user_id and a.status = 'Approved' and a.APPOINTMENT_DATE = :P61_SELECTED_DATE;
      
      

