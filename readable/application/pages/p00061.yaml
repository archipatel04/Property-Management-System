    settings: 
      code: |
        // var purl = "f?p=&APP_ID.:50:&APP_SESSION.";   
        // apex.navigation.redirect (purl);
        
        var appointmentId = AppoitmentId; // यहाँ dynamic value लाओ जैसे IG row से
        
        var url = "f?p=" + $v("pFlowId") + ":50:" + $v("pInstance") + "::::P50_APPOINTMENT_ID:" + appointmentId;
        
        apex.navigation.redirect(url);
        

    execution: 
