- # ====== Region: APPOINTMNET REPORT ==========================
  id: 3692459463531753504
  identification: 
    name: APPOINTMNET REPORT
    type: Interactive Grid

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      -- SELECT 
      --     a.APPOINTMENT_ID,
      --     a.FROM_TYPE,
      --     a.FROM_USER_ID,
      --     a.TO_TYPE,
      --     a.TO_USER_ID,
      --     a.APPOINTMENT_DATE,
      --     a.APPOINTMENT_TIME,
      --     a.LOCATION,
      --     a.STATUS,
      --     a.CREATED_AT,
      --     a.CREATED_BY,
      --     -- APPROVER_REASON,
      --     -- EMAIL,
      --     a.PROPERTY_ID,
      --     u.last_name,
          
      --     -- Button Link Column
      --     '<a class="action-button" target="_blank" ' ||
      --     'href="' || 
      --       APEX_UTIL.PREPARE_URL(
      --          'f?p=&APP_ID.:50:&APP_SESSION.::NO::P50_APPOINTMENT_ID:' || a.APPOINTMENT_ID
      --       ) ||
      --     '">Action</a>' AS ACTION_BUTTON
      
      -- FROM PMS_APPOINTMENT a , pms_users u
      -- where a.from_user_id = u.user_id and a.STATUS= 'Pending' AND 
      -- a.APPOINTMENT_DATE = :P61_SELECTED_DATE;
      
      
      
      select a.APPOINTMENT_ID,
             a.FROM_TYPE,
             a.FROM_USER_ID,
             a.TO_TYPE,
             a.TO_USER_ID,
             a.APPOINTMENT_DATE,
             a.APPOINTMENT_TIME,
             a.LOCATION,
             a.STATUS,
             u.last_name,
             r.role_name,
                -- Button Link Column
          '<a class="action-button" ' ||
          'href="' || 
            APEX_UTIL.PREPARE_URL(
               'f?p=&APP_ID.:62:&APP_SESSION.::NO::P62_APPOINTMENT_ID1:' || a.APPOINTMENT_ID
            ) ||
          '">Action</a>' AS ACTION_BUTTON
        from PMS_APPOINTMENT a 
        join pms_users u on a.FROM_USER_ID = u.user_id 
        join pms_roles r on a.FROM_type = r.role_id
        where  a.to_user_id = :user_id and a.status = 'Pending' and a.APPOINTMENT_DATE = :P61_SELECTED_DATE;
      
      
    page-items-to-submit: 
    - P61_SELECTED_DATE

