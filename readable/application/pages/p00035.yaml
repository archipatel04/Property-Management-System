  id: 35148801718419005533
  identification: 
    name: push notification
    type: Send Push Notification
    execution-chain: None

  settings: 
    to: '&P35_FROM_EMAIL.'
    title: Appointment Rejection
    body: |
      &P35_REASON.
      Date : &P35_APPOINTMENT_DATE.
      Time : &P35_APPOINTMENT_TIME.
      Address : &P35_LOCATION.

