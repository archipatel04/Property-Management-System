  identification: 
    name: New_1
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      BEGIN
        IF :P35_APPOINTMENT_DATE IS NOT NULL THEN
          -- Assume it is stored as date or string in YYYY-MM-DD
          :P35_APPOINTMENT_DATE := TO_CHAR(TO_DATE(:P35_APPOINTMENT_DATE, 'MM-DD-YYYY'), 'DD-MON-YYYY');
        END IF;
      END;
      

  execution: 
