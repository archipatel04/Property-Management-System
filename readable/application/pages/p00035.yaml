- # ====== Process: email sending ==============================
  id: 35148800606873005522
  identification: 
    name: email sending
    type: Send E-Mail
    execution-chain: None

  settings: 
    from: '&P35_FROM.'
    to: archipatel2632004@gmail.com
    subject: Appointment Rejection
    body-plain-text: |
      Dear &P35_TO.,
      
      We hope this message finds you well.
      
      We regret to inform you that your requested appointment for &P35_APPOINTMENT_DATE.,&P35_APPOINTMENT_TIME. regarding &P35_LOCATION. has been declined. Unfortunately, due to Unavailability, we are unable to accommodate the appointment at the requested time.
      
      We sincerely apologize for any inconvenience this may cause.
      Please feel free to suggest an alternative date and time, and we will do our best to assist you accordingly.
      
      Thank you for your understanding.
      
      Kind regards,
      &P35_FROM.
    send-immediately: false

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: Reject # 35148799829071005514
    type: Never

