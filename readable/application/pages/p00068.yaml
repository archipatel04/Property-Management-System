        <a href="&USER_LINK."><i class="fa-solid fa-pen-to-square"></i></a>

    subtitle: 
      advanced-formatting: false

    body: 
      advanced-formatting: true
      html-expression: |
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
        <style>
            .profile-container {
                max-width: 850px;
                background: #fff;
                margin: auto;
                border-radius: 20px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
                overflow: hidden;
                padding: 35px;
            }
        
            .profile-header {
                display: flex;
                align-items: center;
                flex-wrap: wrap;
                /* gap: 30px; */
            }
        
            .profile-image {
                width: 140px;
                height: 140px;
                border-radius: 50%;
                overflow: hidden;
                border: 4px solid #3498db;
            }
        
            .profile-image img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
        
            .profile-details {
                flex: 1;
            }
        
            .profile-details h2 {
                font-size: 26px;
                color: #333;
                margin-bottom: 8px;
            }
        
            .profile-details p {
                font-size: 14px;
                color: #666;
                margin: 4px 0;
            }
        
            .info-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 10px;
                margin-top: 15px;
            }
        
            .info-box {
                background: #f9fbfc;
                padding: 18px 20px;
                border-radius: 12px;
                transition: all 0.3s ease;
                box-shadow: 0 0 0 rgba(0, 0, 0, 0);
            }
        
            .SC {
                display: flex;
                /* gap:30px; */
                justify-content: space-between;
            }
        
            .SC .info-box {
                width: 48%;
            }
        
            .info-box:hover {
                box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
            }
        
            .label {
                font-size: 13px;
                font-weight: 600;
                color: #555;
                margin-bottom: 5px;
            }
        
            .value {
                font-size: 15px;
                color: #222;
            }
        
            .footer {
                text-align: center;
                font-size: 12px;
                color: #888;
                /* margin-top: 40px; */
                padding-top: 10px;
                border-top: 1px solid #eee;
            }
        
            @media (max-width: 600px) {
                .profile-header {
                    flex-direction: column;
                    text-align: center;
                }
            }
        </style>
        
        <!-- <div class="profile-container"> -->
        <div class="profile-header">
            <div class="profile-image">
                <img src="&USER_IMAGE." alt="User Profile">
            </div>
            <div class="profile-details">
                <h2>&FIRST_NAME. &LAST_NAME.</h2>
                <p> <strong>Status: </strong> <strong style="color: green;">&STATUS.</strong></p>
                <p><strong>Email: </strong> &EMAIL.</p>
                <p><strong> Phone: </strong> &PHONE_NUMBER.</p>
            </div>
        </div>
        
        <div class="info-grid">
            <div class="info-box">
                <div class="label">Address</div>
                <div class="value">&ADDRESS.</div>
            </div>
            <div class="SC">
                <div class="info-box">
                    <div class="label">City</div>
                    <div class="value">&CITY.</div>
                </div>
                <div class="info-box">
                    <div class="label">State</div>
                    <div class="value">&STATE.</div>
                </div>
            </div>
            <div class="info-box">
                <div class="label">Registration Date</div>
                <div class="value">&REGISTRATIONDATE.</div>
            </div>
        </div>
        
        <div class="footer">
            PMS User Profile View | Powered by Oracle APEX or Web Interface
        </div>
