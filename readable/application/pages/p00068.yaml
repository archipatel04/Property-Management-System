regions: 
- # ====== Region: Profile =====================================
  id: 42705714395244825029
  identification: 
    name: Profile
    type: Cards

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select USER_ID,
             FIRST_NAME,
             LAST_NAME,
             EMAIL,
             PHONE_NUMBER,
             ADDRESS,
             PASSWORD,
             STATUS,
             REGISTRATIONDATE,
             CREATED_AT,
             CREATED_BY,
             UPDATED_AT,
             UPDATED_BY,
             STATE,
             CITY,
             APEX_PAGE.GET_URL(
                  p_page   => 71,  -- Replace with actual page ID of your modal
                  p_items  => 'P71_USER_ID',
                  p_values => user_id 
             ) AS user_LINK,
             USER_IMAGE
        from PMS_USERS
       where user_id = :user_id

  order-by: 
    type: None

  layout: 
    sequence: 10
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Cards Container
    template-options: 
    - '#DEFAULT#'
    - t-CardsRegion--hideHeader js-addHiddenHeadingRoleDesc
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
