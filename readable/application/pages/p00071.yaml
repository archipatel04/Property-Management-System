- # ====== Process: insert sigup ===============================
  id: 43359578177434884344
  identification: 
    name: insert sigup
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      DECLARE 
          V_USER_ID NUMBER;
      BEGIN
      
          INSERT INTO PMS_USERS(
              FIRST_NAME,
              LAST_NAME,
              EMAIL,
              PHONE_NUMBER,
              ADDRESS,
              STATE,
              CITY,
              PASSWORD,
              STATUS,
              REGISTRATIONDATE,
              CREATED_AT,
              CREATED_BY,
              UPDATED_AT,
              UPDATED_BY
          ) VALUES(
              :P71_FIRST_NAME,
              :P71_LAST_NAME,
              LOWER(:P71_EMAIL),
              :P71_PHONE_NUMBER,
              :P71_ADDRESS,
              :P71_STATE,
              :P71_CITY,
              :P71_PASSWORD,
              'Activ',
              SYSDATE,
              SYSDATE,
              :APP_USER,
              SYSDATE,
              :APP_USER
          )
      
          RETURNING USER_ID into V_USER_ID;
      
          INSERT INTO PMS_USER_ROLE_ACCESS_MASTER(
              USER_ID,
              ROLE_ID,
              CREATED_BY,
              CREATED,
              UPDATED_BY,
              UPDATED
          ) VALUES (
              V_USER_ID,
              :P71_ROLE,
              :APP_USER,
              SYSDATE,
              :APP_USER,
              SYSDATE
          );
      END;

  execution: 
    sequence: 20
    point: Processing
    run-process: Once Per Page Visit (default)

  error: 
    display-location: Inline in Notification

  server-side-condition: 
    when-button-pressed: CREATE # 43359566789983884323

