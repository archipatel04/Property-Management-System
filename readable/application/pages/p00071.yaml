- # ====== Process: Update Signup ==============================
  id: 43347418733170419101
  identification: 
    name: Update Signup
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      UPDATE PMS_USERS
      SET
          FIRST_NAME      = :P71_FIRST_NAME,
          LAST_NAME       = :P71_LAST_NAME,
          PHONE_NUMBER    = :P71_PHONE_NUMBER,
          ADDRESS         = :P71_ADDRESS,
          STATE           = :P71_STATE,
          CITY            = :P71_CITY,
          email = :P71_EMAIL
      WHERE
          USER_ID = :P71_USER_ID;
      
      

