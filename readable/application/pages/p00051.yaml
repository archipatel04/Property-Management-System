- # ====== Dynamic Action: New =================================
  id: 95294753428295
  identification: 
    name: New

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P51_APEX_PAGE_ID

  actions: 
  - # ====== Action: Set Value ===================================
    id: 95346881428296
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: "select DISTINCT(PAGE_NAME) from apex_application_pages where PAGE_ID = :P51_APEX_PAGE_ID AND APPLICATION_NAME = 'Sample Global Property Management Hub'"
      items-to-submit: 
      - P51_APEX_PAGE_ID
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P51_PAGE_NAME

    execution: 
      sequence: 10
      event: New # 95294753428295
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

