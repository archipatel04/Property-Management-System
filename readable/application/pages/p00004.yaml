validations: 
- # ====== Validation: Only characters =========================
  id: 36142582520202390140
  identification: 
    name: Only characters

  execution: 
    sequence: 10

  validation: 
    type: Item matches Regular Expression
    item: P4_NAME
    regular-expression: ^[A-Za-z\s'-]+$
    always-execute: true

  error: 
    error-message: Name can only contain letters, spaces, hyphens, and apostrophes.
    display-location: Inline with Field
    associated-item: P4_NAME # 30597762867596985518

  server-side-condition: 
    when-button-pressed: CREATE # 30597772811199985526

- # ====== Validation: email validation ========================
  id: 36142582666087390141
  identification: 
    name: email validation

  execution: 
    sequence: 20

  validation: 
    type: Item matches Regular Expression
    item: P4_EMAIL
    regular-expression: ^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$
    always-execute: true

  error: 
    error-message: Enter a valid email address.
    display-location: Inline with Field
    associated-item: P4_EMAIL # 30597763234825985518

  server-side-condition: 
    when-button-pressed: CREATE # 30597772811199985526

- # ====== Validation: only 10 digits ==========================
  id: 36142582721954390142
  identification: 
    name: only 10 digits

  execution: 
    sequence: 30

  validation: 
    type: Item matches Regular Expression
    item: P4_PHONE
    regular-expression: ^\d{10}$
    always-execute: true

  error: 
    error-message: Phone number must be exactly 10 digits.
    display-location: Inline with Field
    associated-item: P4_PHONE # 30597763641009985518

  server-side-condition: 
    when-button-pressed: CREATE # 30597772811199985526

- # ====== Validation: validate password =======================
  id: 36142582889092390143
  identification: 
    name: validate password

  execution: 
    sequence: 40

  validation: 
    type: Item matches Regular Expression
    item: P4_PASSWORD
    regular-expression: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$
    always-execute: true

  error: 
    error-message: Password must be at least 8 characters, include uppercase, lowercase, and a number.
    display-location: Inline with Field
    associated-item: P4_PASSWORD # 30597764085326985519

  server-side-condition: 
    when-button-pressed: CREATE # 30597772811199985526

