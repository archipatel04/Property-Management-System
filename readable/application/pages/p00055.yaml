- # ====== Dynamic Action: New =================================
  id: 95479226428297
  identification: 
    name: New

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P55_PAGE_ID

  actions: 
  - # ====== Action: Set Value ===================================
    id: 95525156428298
    identification: 
      action: Set Value

    settings: 
      set-type: SQL Statement
      sql-statement: 'select APEX_PAGE_ID from PMS_PAGE_MASTER where page_id = :P55_PAGE_ID'
      items-to-submit: 
      - P55_PAGE_ID
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P55_APEX_PAGE_ID

    execution: 
      sequence: 10
      event: New # 95479226428297
      fire-when-event-result-is: True
      fire-on-initialization: true
      stop-execution-on-error: true
      wait-for-result: true

