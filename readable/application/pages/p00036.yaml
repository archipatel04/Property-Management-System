    - # ====== Layer: Redirect to Map Page =========================
      id: 36715240037833319118
      identification: 
        name: Redirect to Map Page
        layer-type: Points

      layout: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          SELECT
              PT.PROPERTY_TYPE,
              P.AREA,
              P.PRICE,
              P.ADDRESS,
              P.PROPERTY_ID AS ID,
              APEX_PAGE.GET_URL(
                      p_page   => 33,  -- Replace with actual page ID of your modal
                      p_items  => 'P33_PROPERTY_ID',
                      p_values => PROPERTY_ID 
                 ) AS PROPERTY_LINK,
              P.PROPERTY_NAME AS NAME,
              TO_NUMBER(SUBSTR(LAT_LONG, 1, INSTR(LAT_LONG, ',') - 1)) AS LATITUDE,
              TO_NUMBER(SUBSTR(LAT_LONG, INSTR(LAT_LONG, ',') + 1)) AS LONGITUDE 
          FROM PMS002_PROPERTY P, PMS002_PROPERTY_TYPES PT
          WHERE LAT_LONG IS NOT NULL AND P.PROPERTY_TYPES_ID = PT.PROPERTY_TYPES_ID
        use-spatial-index: false

      column-mapping: 
        geometry-column-data-type: Longitude/Latitude
        longitude-column: LONGITUDE
        latitude-column: LATITUDE

      point-objects: 
        style: SVG
        shape: Triangle

      point-clustering: 
        enable: false

      tooltip: 
        advanced-formatting: true
        html-expression: |
