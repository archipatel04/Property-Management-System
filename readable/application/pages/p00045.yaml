  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      -- SELECT pm.PROPERTY_ID,
      --        pm.AREA,
      --        pm.PROJECT_NAME,
      --        pc.PROPERTY_CATEGORY_NAME,
      --        pt.PROPERTY_TYPE,
      --        pu.PROPERTY_UNITS_NAME,
      --        pm.PRICE,
      --        pm.HANDOVER_DATE,
      --        pm.ADDRESS,
      --        pm.CITY,
      --        pm.LAT_LONG,
      --        pm.LANDMARK,
      --     --    pm.IMAGE_URL,
      --      REGEXP_SUBSTR(PM.IMAGE_URL, '[^,]+', 1, 1) AS FIRST_IMAGE_URL,
      --        pp.PROPERTY_PURPOSE,
      --        ps.PROPERTY_AVAILABILITY_STATUS,
      --        pf.PROPERTY_FURNISHING_STATUS,
      --        pfd.PROPERTY_FACING_DIRECTION,
      --        pm.PROPERTY_AGE,
      --        pm.AMENITIES_TYPE
      --     --    pm.LISTINGBY,
      --     --    pm.LISTING_FOR,
      --     --    pm.CREATED_AT,
      --     --    pm.CREATED_BY,
      --     --    pm.UPDATED_AT,
      --     --    pm.UPDATED_BY
      -- FROM PMS_PROPERTY_MASTER pm
      -- -- JOIN pms_users u ON u.user_id = pm.listingby
      -- -- JOIN PMS_USER_ROLE_ACCESS_MASTER ur ON ur.user_id = u.user_id
      -- JOIN PMS_PROPERTY_CATEGORY pc ON pm.PROPERTY_CATEGORY = pc.PROPERTY_CATEGORY_ID
      -- JOIN PMS_PROPERTY_TYPE pt ON pt.PROPERTY_TYPE_ID = pm.PROPERTY_TYPE
      -- JOIN PMS_PROPERTY_UNITS pu ON pu.PROPERTY_UNITS_ID = pm.PROPERTY_UNITS
      -- JOIN PMS_PROPERTY_PURPOSE pp ON pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
      -- JOIN PMS_PROPERTY_STATUS ps ON ps.PROPERTY_AVAILABILITY_STATUS_ID = pm.PROPERTY_AVAILABILITY_STATUS
      -- JOIN PMS_PROPERTY_FURNISHING pf ON pf.PROPERTY_FURNISHING_ID = pm.PROPERTY_FURNISHING
      -- JOIN PMS_PROPERTY_FACING_DIRECTION pfd ON pfd.PROPERTY_FACING_DIRECTION_ID = pm.PROPERTY_FACING_DIRECTION
      
      -- WHERE (:P45_PROPERTY_TYPE IS NULL OR pm.PROPERTY_TYPE = :P45_PROPERTY_TYPE)
      --   AND (:P45_AVAILABILITY_STATUS IS NULL OR pm.PROPERTY_AVAILABILITY_STATUS = :P45_AVAILABILITY_STATUS)
      --    AND (pm.listing_by = :user_id or pm.listing_for = :user_id) 
      -- ORDER BY pm.PROPERTY_ID ASC;
      
      SELECT pm.PROPERTY_ID,
             pm.AREA,
             pm.PROJECT_NAME,
             pc.PROPERTY_CATEGORY_NAME,
             pt.PROPERTY_TYPE,
             pu.PROPERTY_UNITS_NAME,
             TO_CHAR(pm.PRICE, '999,99,99,999') AS PRICE,
             pm.HANDOVER_DATE,
             pm.ADDRESS,
             pm.CITY,
             pm.LAT_LONG,
             pm.LANDMARK,
             COALESCE(REGEXP_SUBSTR(pm.IMAGE_URL, '[^,]+', 1, 1), 'default.jpg') AS FIRST_IMAGE_URL,
             pp.PROPERTY_PURPOSE,
             ps.PROPERTY_AVAILABILITY_STATUS,
             pf.PROPERTY_FURNISHING_STATUS,
             pfd.PROPERTY_FACING_DIRECTION,
             pm.PROPERTY_AGE,
             pm.AMENITIES_TYPE,
             pm.PROJECT_NAME || ' ' || pm.PROPERTY_NAME AS DISPLAY_PROPERTY_TITLE,
             CASE 
               WHEN pp.PROPERTY_PURPOSE = 'Sale' THEN 'badge-sale'
               WHEN pp.PROPERTY_PURPOSE = 'Rent' THEN 'badge-rent'
               ELSE 'badge-default'
             END AS PURPOSE_CLASS
      FROM PMS_PROPERTY_MASTER pm
      JOIN PMS_PROPERTY_CATEGORY pc ON pm.PROPERTY_CATEGORY = pc.PROPERTY_CATEGORY_ID
      JOIN PMS_PROPERTY_TYPE pt ON pt.PROPERTY_TYPE_ID = pm.PROPERTY_TYPE
      JOIN PMS_PROPERTY_UNITS pu ON pu.PROPERTY_UNITS_ID = pm.PROPERTY_UNITS
      JOIN PMS_PROPERTY_PURPOSE pp ON pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
      JOIN PMS_PROPERTY_STATUS ps ON ps.PROPERTY_AVAILABILITY_STATUS_ID = pm.PROPERTY_AVAILABILITY_STATUS
      JOIN PMS_PROPERTY_FURNISHING pf ON pf.PROPERTY_FURNISHING_ID = pm.PROPERTY_FURNISHING
      JOIN PMS_PROPERTY_FACING_DIRECTION pfd ON pfd.PROPERTY_FACING_DIRECTION_ID = pm.PROPERTY_FACING_DIRECTION
      
      WHERE (:P45_PROPERTY_TYPE IS NULL OR pm.PROPERTY_TYPE = :P45_PROPERTY_TYPE)
        AND (:P45_AVAILABILITY_STATUS IS NULL OR pm.PROPERTY_AVAILABILITY_STATUS = :P45_AVAILABILITY_STATUS)
        AND (pm.listing_by = :user_id OR pm.listing_for = :user_id)
      ORDER BY pm.PROPERTY_ID ASC;
      
    page-items-to-submit: 
    - P45_PROPERTY_TYPE
    - P45_AVAILABILITY_STATUS

