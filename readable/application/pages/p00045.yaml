- # ====== Region: Builder Project Report ======================
  id: 34373649902012043016
  identification: 
    name: Builder Project Report
    type: Cards

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      -- SELECT pm.PROPERTY_ID,
      --        pm.AREA,
      --        pm.PROJECT_NAME,
      --        pm.PROJECT_DESCRIPTION,
      --        pm.LAUNCH_DATE,
      --        pm.PROPERTY_NAME,
      --        pm.PROPERTY_DESCRIPTION,
      --        pm.PROPERTY_CATEGORY,
      --        pm.PROPERTY_SUB_CATEGORY,
      --        pm.PROPERTY_UNITS,
      --        pm.PROPERTY_PURPOSE,
      --        pm.PROPERTY_COMPLETION_STATUS,
      --        pm.PROPERTY_FURNISHING,
      --        pm.PROPERTY_FACING_DIRECTION,
      --        pc.PROPERTY_CATEGORY_NAME,
      --        psc.PROPERTY_SUB_CATEGORY_NAME,
      --        pu.PROPERTY_UNITS_NAME,
      --        pm.PRICE,
      --        pm.HANDOVER_DATE,
      --        pm.ADDRESS,
      --        pm.city,
      --     --    pm.LATLONG,
      --         to_number(SUBSTR(latlong, 1, INSTR(pm.latlong, ',') - 1)) AS latitude,
      --   to_number(SUBSTR(latlong, INSTR(pm.latlong, ',') + 1)) AS longitude,
      --        pm.LANDMARK,
      --        pp.PROPERTY_PURPOSE_NAME,
      --        ps.PROPERTY_COMPLETION_STATUS_NAME,
      --        pf.PROPERTY_FURNISHING_NAME,
      --        pfd.PROPERTY_FACING_DIRECTION_NAME,
      --        pm.PROPERTY_AGE,
      --        pi.FILE_NAME,
      --        pi.MIME_TYPE,
      --        pi.IMAGE_BLOB,
      --        pm.AMENITIES_TYPE,
      --        pm.LISTINGBY,
      --        pm.LISTING_FOR,
      --        pm.CREATED_AT,
      --        pm.CREATED_BY,
      --        pm.UPDATED_AT,
      --        pm.UPDATED_BY
      -- FROM PMS_PROPERTY_MASTER pm
      -- JOIN pms_users u ON u.user_id = pm.listingby
      -- JOIN PMS_USER_ROLE_ACCESS_MASTER ur ON ur.user_id = u.user_id
      -- JOIN PMS_PROPERTY_CATEGORY pc ON pm.PROPERTY_CATEGORY = pc.PROPERTY_CATEGORY_ID
      -- JOIN PMS_PROPERTY_SUB_CATEGORY psc ON psc.PROPERTY_SUB_CATEGORY_ID = pm.PROPERTY_SUB_CATEGORY
      -- JOIN PMS_PROPERTY_UNITS pu ON pu.PROPERTY_UNITS_ID = pm.PROPERTY_UNITS
      -- JOIN PMS_PROPERTY_PURPOSE pp ON pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
      -- JOIN PMS_PROPERTY_STATUS ps ON ps.PROPERTY_COMPLETION_STATUS_ID = pm.PROPERTY_COMPLETION_STATUS
      -- JOIN PMS_PROPERTY_FURNISHING pf ON pf.PROPERTY_FURNISHING_ID = pm.PROPERTY_FURNISHING
      -- JOIN PMS_PROPERTY_FACING_DIRECTION pfd ON pfd.PROPERTY_FACING_DIRECTION_ID = pm.PROPERTY_FACING_DIRECTION
      -- WHERE (:P45_PROPERTY_TYPE IS NULL OR pm.PROPERTY_CATEGORY = :P45_PROPERTY_TYPE)
      -- --   AND (:P1_SUB_CATEGORY IS NULL OR pm.PROPERTY_SUB_CATEGORY = :P1_SUB_CATEGORY)
      -- --   AND (:P1_UNITS IS NULL OR pm.PROPERTY_UNITS = :P1_UNITS)
      -- --   AND (:P1_PURPOSE IS NULL OR pm.PROPERTY_PURPOSE = :P1_PURPOSE)
      --   AND (:P45_AVAILABILITY_STATUS IS NULL OR pm.PROPERTY_COMPLETION_STATUS = :P45_AVAILABILITY_STATUS)
      -- --   AND (:P1_FURNISHING IS NULL OR pm.PROPERTY_FURNISHING = :P1_FURNISHING)
      -- --   AND (:P1_FASING_DIRECTION IS NULL OR pm.PROPERTY_FACING_DIRECTION = :P1_FASING_DIRECTION)
      --   and (pm.listingby = :user_id or pm.listing_for = :user_id) 
      -- ORDER BY pm.PROPERTY_ID ASC;
      
      
      
      
      
      
      SELECT pm.PROPERTY_ID,
             pm.AREA,
             pm.PROJECT_NAME,
             pc.PROPERTY_CATEGORY_NAME,
             pt.PROPERTY_TYPE,
             pu.PROPERTY_UNITS_NAME,
             pm.PRICE,
             pm.HANDOVER_DATE,
             pm.ADDRESS,
             pm.CITY,
             pm.LAT_LONG,
             pm.LANDMARK,
          --    pm.IMAGE_URL,
           REGEXP_SUBSTR(PM.IMAGE_URL, '[^,]+', 1, 1) AS FIRST_IMAGE_URL,
             pp.PROPERTY_PURPOSE,
             ps.PROPERTY_AVAILABILITY_STATUS,
             pf.PROPERTY_FURNISHING_STATUS,
             pfd.PROPERTY_FACING_DIRECTION,
             pm.PROPERTY_AGE,
             pm.AMENITIES_TYPE
          --    pm.LISTINGBY,
          --    pm.LISTING_FOR,
          --    pm.CREATED_AT,
          --    pm.CREATED_BY,
          --    pm.UPDATED_AT,
          --    pm.UPDATED_BY
      FROM PMS_PROPERTY_MASTER pm
      -- JOIN pms_users u ON u.user_id = pm.listingby
      -- JOIN PMS_USER_ROLE_ACCESS_MASTER ur ON ur.user_id = u.user_id
      JOIN PMS_PROPERTY_CATEGORY pc ON pm.PROPERTY_CATEGORY = pc.PROPERTY_CATEGORY_ID
      JOIN PMS_PROPERTY_TYPE pt ON pt.PROPERTY_TYPE_ID = pm.PROPERTY_TYPE
      JOIN PMS_PROPERTY_UNITS pu ON pu.PROPERTY_UNITS_ID = pm.PROPERTY_UNITS
      JOIN PMS_PROPERTY_PURPOSE pp ON pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
      JOIN PMS_PROPERTY_STATUS ps ON ps.PROPERTY_AVAILABILITY_STATUS_ID = pm.PROPERTY_AVAILABILITY_STATUS
      JOIN PMS_PROPERTY_FURNISHING pf ON pf.PROPERTY_FURNISHING_ID = pm.PROPERTY_FURNISHING
      JOIN PMS_PROPERTY_FACING_DIRECTION pfd ON pfd.PROPERTY_FACING_DIRECTION_ID = pm.PROPERTY_FACING_DIRECTION
      
      WHERE (:P45_PROPERTY_TYPE IS NULL OR pm.PROPERTY_TYPE = :P45_PROPERTY_TYPE)
        AND (:P45_AVAILABILITY_STATUS IS NULL OR pm.PROPERTY_AVAILABILITY_STATUS = :P45_AVAILABILITY_STATUS)
         AND (pm.listing_by = :user_id or pm.listing_for = :user_id) 
      ORDER BY pm.PROPERTY_ID ASC;
    page-items-to-submit: 
    - P45_PROPERTY_TYPE
    - P45_AVAILABILITY_STATUS

  order-by: 
    type: None

