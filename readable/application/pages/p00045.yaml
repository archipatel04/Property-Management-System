- # ====== Region: Builder Property Report =====================
  id: 33405333282741842925
  identification: 
    name: Builder Property Report
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select pm.PROPERTY_ID,
             pm.AREA,
             pc.PROPERTY_CATEGORY_NAME,
             psc.PROPERTY_SUB_CATEGORY_NAME,
             pu.PROPERTY_UNITS_NAME,
             pm.PRICE,
             pm.HANDOVER_DATE,
             pm.ADDRESS,
             pm.LOCATION,
             pm.LATLONG,
             pm.LANDMARK,
             pp.PROPERTY_PURPOSE_NAME,
             case pp.PROPERTY_PURPOSE_NAME
             when 'Rent' then 'warning'
             when 'Sale' then 'danger'
             end as property_purpose,
             ps.PROPERTY_COMPLETION_STATUS_NAME,
             pf.PROPERTY_FURNISHING_NAME,
             pfd.PROPERTY_FACING_DIRECTION_NAME,
             pm.PROPERTY_AGE,
             pm.IMAGE_VIDEO,
             pm.AMENITIES_TYPE,
             pm.LISTINGBY,
             PM.LISTING_FOR,
             pm.CREATED_AT,
             pm.CREATED_BY,
             pm.UPDATED_AT,
             pm.UPDATED_BY,
             (select first_name from pms_users where user_id = pm.listing_for) as listing_for_name
        from PMS_PROPERTY_MASTER pm
        join pms_users u on u.user_id = pm.listingby
        join PMS_USER_ROLE_ACCESS_MASTER ur on ur.user_id = u.user_id
        join PMS_PROPERTY_CATEGORY pc on pm.PROPERTY_CATEGORY = pc.PROPERTY_CATEGORY_ID
        join PMS_PROPERTY_SUB_CATEGORY psc on psc.PROPERTY_SUB_CATEGORY_ID = pm.PROPERTY_SUB_CATEGORY
        join PMS_PROPERTY_UNITS pu on pu.PROPERTY_UNITS_ID = pm.PROPERTY_UNITS
        join PMS_PROPERTY_PURPOSE pp on pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
        join PMS_PROPERTY_STATUS ps on ps.PROPERTY_COMPLETION_STATUS_ID = pm.PROPERTY_COMPLETION_STATUS
        join PMS_PROPERTY_FURNISHING pf on pf.PROPERTY_FURNISHING_ID = pm.PROPERTY_FURNISHING
        join PMS_PROPERTY_FACING_DIRECTION pfd on pfd.PROPERTY_FACING_DIRECTION_ID = pm.PROPERTY_FACING_DIRECTION
      where (pm.listingby = :user_id or pm.listing_for = :user_id) 
      -- and pm.PROPERTY_COMPLETION_STATUS = 2
      

  layout: 
    sequence: 20
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

  appearance: 
    template: Interactive Report
    template-options: 
    - '#DEFAULT#'
    - t-IRR-region--hideHeader js-addHiddenHeadingRoleDesc
    render-components: Above Content

  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    region-display-selector: false
    exclude-title-from-translation: false

  server-cache: 
    caching: Disabled

