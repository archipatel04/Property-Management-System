- # ====== Region: Agent =======================================
  id: 30714600937491535249
  identification: 
    name: Agent
    type: Interactive Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select A.AGENTID,
             A.AGENCYID,
             AG.AGENCYNAME,
             A.ROW_KEY,
             A.BRN,
             A.ABOUTAGENT,
             A.LICENSENUMBER,
             A.EXPERIENCE,
             A.SPECIALIZATIONAREA,
             A.WORKINGHOURS,
             A.TOTALPROPERTIESLISTED,
             A.ACTIVELISTINGSCOUNT,
             A.RERAREGISTRATIONCERTIFICATE,
             A.AGENTTYPE,
             A.ROW_VERSION,
             A.CREATED,
             A.CREATED_BY,
             A.UPDATED,
             A.UPDATED_BY,
             A.USER_ID,
             U.NAME
        from PMS002_AGENT A, PMS002_USERS U, PMS002_AGENCY AG WHERE U.USERID = A.USER_ID AND AG.AGENCYID = A.AGENCYID

  layout: 
    sequence: 10
    parent-region: No Parent
