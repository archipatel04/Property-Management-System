- # ====== Region: Appointments ================================
  id: 3515074738288299457
  identification: 
    name: Appointments
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      -- SELECT 
      --     APPOINTMENT_ID,
      --     FROM_TYPE,
      --     FROM_USER_ID,
      --     TO_TYPE,
      --     TO_USER_ID,
      --     APPOINTMENT_DATE,
      --     APPOINTMENT_TIME,
      --     LOCATION,
      --     STATUS,
      --     CREATED_AT,
      --     CREATED_BY,
      --     PROPERTY_ID
      -- FROM 
      --     PMS_APPOINTMENT
      -- WHERE 
      -- PROPERTY_ID = :P62_PROPERTY_ID AND
      --     TRUNC(APPOINTMENT_DATE) = (
      --         SELECT TRUNC(APPOINTMENT_DATE)
      --         FROM PMS_APPOINTMENT
      --         WHERE APPOINTMENT_ID = :P62_APPOINTMENT_ID1
      --     );
      
      
      
      select a.APPOINTMENT_ID,
             a.FROM_TYPE,
             a.FROM_USER_ID,
             a.TO_TYPE,
             a.TO_USER_ID,
             a.APPOINTMENT_DATE,
             a.APPOINTMENT_TIME,
             a.LOCATION,
             a.STATUS,
             u.last_name,
             r.role_name
        from PMS_APPOINTMENT a 
        join pms_users u on a.FROM_USER_ID = u.user_id 
        join pms_roles r on a.FROM_type = r.role_id
        where a.APPOINTMENT_ID = :P62_APPOINTMENT_ID1
      
      
    page-items-to-submit: 
    - P62_APPOINTMENT_ID1

  order-by: 
    type: None

  layout: 
