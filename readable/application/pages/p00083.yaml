    settings: 
      set-type: SQL Statement
      sql-statement: 'select first_name from pms_users where user_id = :P83_TO_USER_ID'
      items-to-submit: 
      - P83_TO_USER_ID
      escape-special-characters: true
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
