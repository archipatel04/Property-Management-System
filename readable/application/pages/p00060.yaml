  accessibility: 
    use-landmark: true
    landmark-type: Template Default

  advanced: 
    static-id: myCalendar
    region-display-selector: false
    exclude-title-from-translation: false

  security: 
    escape-special-characters: false

  customization: 
    customizable: Not Customizable By End Users

  attributes: 
    settings: 
      display-column: TOTAL_COUNT
      start-date-column: APPOINTMENT_DATE
      event-sorting: Automatic
      show-time: false
      supplemental-information: |
        
        
      multiple-line-events: false
      show-tooltip: false
      additional-calendar-views: 'list:navigation'
      view-/-edit-link: 
        url: 'f?p=&APP_ID.:61:&SESSION.::&DEBUG.::P61_SELECTED_DATE:&APPOINTMENT_DATE.'
        page: 61 # APPOINTMNET Calendar  REPORT
        values: 
          p61_selected_date: '&APPOINTMENT_DATE.'

      maximum-events-/-day: 10
      show-weekend: true
      css-class: CSS_CLASS

    performance: 
      lazy-loading: false

    advanced: 
      initialization-javascript-function: |
        function(options) {
          // disable past dates using validRange option
          options.validRange = {
            start: new Date()  // means today se pehle ke dates disable ho jayenge
          };
          
          return options;
        }
        

