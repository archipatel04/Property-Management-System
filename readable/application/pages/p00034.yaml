    layers: 
    - # ====== Layer: Map Location =================================
      id: 36069586054623192471
      identification: 
        name: Map Location
        layer-type: Points

      layout: 
        sequence: 10

      source: 
        location: Local Database
        type: SQL Query
        sql-query: |
          -- select PROPERTY_ID,
          --        PROPERTY_TYPES_ID,
          --        STATUS_ID,
          --        ADDRESS,
          --        PURCHASE_DATE,
          --        AREA,
          --        PROPERTY_AGE,
          --        FLOOR_NUMBER,
          --        TOTAL_FLOORS,
          --        FURNISHING_STATUS,
          --        FACING_DIRECTION,
          --        IMAGES_VIDEOS_UPLOAD,
          --        MAP_LOCATION,
          --        NEAR_BY_LOCATIONS,
          --        LAT_LONG,
          --        LANDMARK,
          --        LISTING_BY,
          --        PRICE,
          --        PROJECT_NAME,
          --        PROPERTY_NAME,
          --        PURPOSE,
          --        CREATED,
          --        CREATED_BY,
          --        UPDATED,
          --        UPDATED_BY,
          --        USER_ID
          --   from PMS002_PROPERTY
          
          
          -- SELECT 
          --   PROPERTY_ID AS ID,
          --   TO_NUMBER(TRIM(SUBSTR(LAT_LONG, 1, INSTR(LAT_LONG, ',') - 1))) AS LATITUDE,
          --   TO_NUMBER(TRIM(SUBSTR(LAT_LONG, INSTR(LAT_LONG, ',') + 1))) AS LONGITUDE,
          --   'Property ID: ' || PROPERTY_ID AS PROPERTY_NAME
          -- --   IMG_URL -- Make sure to replace this with your image URL column
          -- FROM 
          --   PMS002_PROPERTY
          -- WHERE 
          --   LAT_LONG IS NOT NULL
          
          
            SELECT
              PT.PROPERTY_TYPE,
              P.AREA,
              P.PRICE,
              P.ADDRESS,
              P.PROPERTY_ID AS ID,
              TO_NUMBER(:P34_LATITUDE) AS latitude,
              TO_NUMBER(:P34_LONGITUDE) AS longitude,
              'Property ID: ' || P.PROPERTY_ID AS PROPERTY_NAME
          FROM PMS002_PROPERTY P, PMS002_PROPERTY_TYPES PT
          WHERE :P34_LATITUDE IS NOT NULL AND :P34_LONGITUDE IS NOT NULL AND P.PROPERTY_ID = :P34_PROPERTY_ID AND PT.PROPERTY_TYPE = :P34_PROPERTY_TYPE
          
          
          
        page-items-to-submit: 
        - P34_LATITUDE
        - P34_LONGITUDE
        - P34_PROPERTY_ID
        - P34_PROPERTY_TYPE
        use-spatial-index: false

      column-mapping: 
        geometry-column-data-type: Longitude/Latitude
        longitude-column: LONGITUDE
        latitude-column: LATITUDE

      point-objects: 
        style: SVG
        shape: Pentagon

      appearance: 
        fill-color: '#c61515'
        stroke-color: '#2bff00'

      point-clustering: 
        enable: false

      tooltip: 
        advanced-formatting: true
        html-expression: |
          <div style="padding: 15px; max-width: 300px; font-family: Arial, sans-serif;">
          <div style="text-align: center;">
          
