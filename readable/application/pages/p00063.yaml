- # ====== Region: Appointment Report  =========================
  id: 14979046422392703
  identification: 
    name: 'Appointment Report '
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select A.APPOINTMENT_ID,
             A.FROM_TYPE,
             A.FROM_USER_ID,
             A.TO_TYPE,
             R.ROLE_NAME,
             A.TO_USER_ID,
             U.LAST_NAME,
             A.APPOINTMENT_DATE,
             A.APPOINTMENT_TIME,
             A.LOCATION,
             A.STATUS,
              CASE 
              WHEN a.STATUS = 'Approved' THEN 
                  '<span class="t-Badge t-Badge--success">Approved</span>'
              WHEN a.STATUS = 'Rejected' THEN 
                  '<span class="t-Badge t-Badge--danger">Rejected</span>'
              WHEN a.STATUS = 'Pending' THEN 
                  '<span class="t-Badge t-Badge--warning">Pending</span>'
              ELSE 
                  '<span class="t-Badge t-Badge--neutral">' || a.STATUS || '</span>'
          END AS STATUS_BADGE
        from PMS_APPOINTMENT A 
        JOIN PMS_ROLES R ON A.TO_TYPE = R.ROLE_ID 
        JOIN PMS_USERS U ON U.USER_ID = A.TO_USER_ID
        WHERE a.APPOINTMENT_DATE  = :P63_APPOINTMENT_DATE AND FROM_TYPE = :role_id
        order by A.APPOINTMENT_DATE desc,A.APPOINTMENT_TIME asc
    page-items-to-submit: 
    - P63_APPOINTMENT_DATE

  order-by: 
    type: None

