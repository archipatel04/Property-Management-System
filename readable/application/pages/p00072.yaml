  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      -- SELECT pm.PROPERTY_ID,
      --        pm.AREA,
      --        pm.PROJECT_NAME,
      --        pc.PROPERTY_CATEGORY_NAME,
      --        pt.PROPERTY_TYPE,
      --        pu.PROPERTY_UNITS_NAME,
      --        pm.PRICE,
      --        pm.HANDOVER_DATE,
      --        PM.LAUNCH_DATE,
      --        PM.PROPERTY_NAME,
      --        PM.PROPERTY_AGE,
      --        pm.ADDRESS,
      --        pm.CITY,
      --        pm.LAT_LONG,
      --        pm.LANDMARK,
      --     --    pm.IMAGE_URL,
      --      REGEXP_SUBSTR(PM.IMAGE_URL, '[^,]+', 1, 1) AS FIRST_IMAGE_URL,
      --        pp.PROPERTY_PURPOSE,
      --        ps.PROPERTY_AVAILABILITY_STATUS,
      --        pf.PROPERTY_FURNISHING_STATUS,
      --        pfd.PROPERTY_FACING_DIRECTION,
      --        pm.AMENITIES_TYPE,
      --        pm.created_at,
      --        U.FIRST_NAME,
      --        U.LAST_NAME,
      --        APEX_PAGE.GET_URL(
      --             p_page   => 56,  -- Replace with actual page ID of your modal
      --             p_items  => 'P56_PROPERTY_ID',
      --             p_values => PROPERTY_ID 
      --        ) AS DETAIS_LINK,
      --        APEX_PAGE.GET_URL(
      --             p_page   => 73,  -- Replace with actual page ID of your modal
      --             p_items  => 'P73_property_id',
      --             p_values => PROPERTY_ID 
      --        ) AS DELETE_LINK,
      --        APEX_PAGE.GET_URL(
      --             p_page   => 59,  -- Replace with actual page ID of your modal
      --             p_items  => 'P59_property_id',
      --             p_values => PROPERTY_ID 
      --        ) AS update_LINK
      -- FROM PMS_PROPERTY_MASTER pm
      -- JOIN pms_users u ON u.user_id = pm.listing_by
      -- JOIN PMS_USER_ROLE_ACCESS_MASTER ur ON ur.user_id = u.user_id
      -- JOIN PMS_PROPERTY_CATEGORY pc ON pm.PROPERTY_CATEGORY = pc.PROPERTY_CATEGORY_ID
      -- JOIN PMS_PROPERTY_TYPE pt ON pt.PROPERTY_TYPE_ID = pm.PROPERTY_TYPE
      -- JOIN PMS_PROPERTY_UNITS pu ON pu.PROPERTY_UNITS_ID = pm.PROPERTY_UNITS
      -- JOIN PMS_PROPERTY_PURPOSE pp ON pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
      -- JOIN PMS_PROPERTY_STATUS ps ON ps.PROPERTY_AVAILABILITY_STATUS_ID = pm.PROPERTY_AVAILABILITY_STATUS
      -- JOIN PMS_PROPERTY_FURNISHING pf ON pf.PROPERTY_FURNISHING_ID = pm.PROPERTY_FURNISHING
      -- JOIN PMS_PROPERTY_FACING_DIRECTION pfd ON pfd.PROPERTY_FACING_DIRECTION_ID = pm.PROPERTY_FACING_DIRECTION
      
      -- WHERE (pm.listing_by = :user_id or pm.listing_for = :user_id) and pm.PROPERTY_AVAILABILITY_STATUS = 1
      -- ORDER BY pm.PROPERTY_ID ASC;
      
      
      
      SELECT pm.PROPERTY_ID,
             pm.AREA,
             pm.PROJECT_NAME,
             pc.PROPERTY_CATEGORY_NAME,
             pt.PROPERTY_TYPE,
             pu.PROPERTY_UNITS_NAME,
             pm.PRICE,
             pm.HANDOVER_DATE,
             PM.LAUNCH_DATE,
             PM.PROPERTY_NAME,
             PM.PROPERTY_AGE,
             pm.ADDRESS,
             pm.CITY,
             pm.LAT_LONG,
             pm.LANDMARK,
          --    pm.IMAGE_URL,
           REGEXP_SUBSTR(PM.IMAGE_URL, '[^,]+', 1, 1) AS FIRST_IMAGE_URL,
             pp.PROPERTY_PURPOSE,
             ps.PROPERTY_AVAILABILITY_STATUS,
             pf.PROPERTY_FURNISHING_STATUS,
             pfd.PROPERTY_FACING_DIRECTION,
             pm.AMENITIES_TYPE,
      (
        SELECT LISTAGG(am.AMENITIES_TYPE, ', ') WITHIN GROUP (ORDER BY am.AMENITIES_TYPE)
        FROM PMS_AMENITIES_TYPE am
        WHERE ',' || pm.AMENITIES_TYPE || ',' LIKE '%,' || am.AMENITIES_TYPE_ID || ',%'
      ) AS AMENITIES_LIST,
             pm.created_at,
             U.FIRST_NAME,
             U.LAST_NAME,
             APEX_PAGE.GET_URL(
                  p_page   => 56,  -- Replace with actual page ID of your modal
                  p_items  => 'P56_PROPERTY_ID',
                  p_values => PROPERTY_ID 
             ) AS DETAILS_LINK,
             APEX_PAGE.GET_URL(
                  p_page   => 73,  -- Replace with actual page ID of your modal
                  p_items  => 'P73_property_id',
                  p_values => PROPERTY_ID 
             ) AS DELETE_LINK,
             APEX_PAGE.GET_URL(
                  p_page   => 59,  -- Replace with actual page ID of your modal
                  p_items  => 'P59_PROPERTY_ID',
                  p_values => PROPERTY_ID 
             ) AS update_LINK
      FROM PMS_PROPERTY_MASTER pm
      JOIN pms_users u ON u.user_id = pm.listing_by
      JOIN PMS_USER_ROLE_ACCESS_MASTER ur ON ur.user_id = u.user_id
      JOIN PMS_PROPERTY_CATEGORY pc ON pm.PROPERTY_CATEGORY = pc.PROPERTY_CATEGORY_ID
      JOIN PMS_PROPERTY_TYPE pt ON pt.PROPERTY_TYPE_ID = pm.PROPERTY_TYPE
      JOIN PMS_PROPERTY_UNITS pu ON pu.PROPERTY_UNITS_ID = pm.PROPERTY_UNITS
      JOIN PMS_PROPERTY_PURPOSE pp ON pp.PROPERTY_PURPOSE_ID = pm.PROPERTY_PURPOSE
      JOIN PMS_PROPERTY_STATUS ps ON ps.PROPERTY_AVAILABILITY_STATUS_ID = pm.PROPERTY_AVAILABILITY_STATUS
      JOIN PMS_PROPERTY_FURNISHING pf ON pf.PROPERTY_FURNISHING_ID = pm.PROPERTY_FURNISHING
      JOIN PMS_PROPERTY_FACING_DIRECTION pfd ON pfd.PROPERTY_FACING_DIRECTION_ID = pm.PROPERTY_FACING_DIRECTION
      
      WHERE (pm.listing_by = :user_id or pm.listing_for = :user_id) and pm.PROPERTY_AVAILABILITY_STATUS = 1
      ORDER BY pm.PROPERTY_ID ASC;
      

