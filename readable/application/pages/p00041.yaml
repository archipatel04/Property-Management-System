processes: 
- # ====== Process: INSERT DATA ================================
  id: 42289716656290921326
  identification: 
    name: INSERT DATA
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      -- DECLARE
      --     v_property_id NUMBER;
      
      --     CURSOR l_cur_files IS
      --         SELECT c001    AS filename,
      --                c002    AS mime_type,
      --                d001    AS date_created,
      --                n001    AS file_id,
      --                blob001 AS file_content
      --           FROM apex_collections
      --          WHERE collection_name = 'DROPZONE_UPLOAD';
      -- BEGIN
          -- INSERT INTO PMS002_PROPERTY (
          --     PROPERTY_TYPES_ID,
          --     STATUS_ID,
          --     ADDRESS,
          --     PURCHASE_DATE,
          --     AREA,
          --     PROPERTY_AGE,
          --     FLOOR_NUMBER,
          --     TOTAL_FLOORS,
          --     FURNISHING_STATUS,
          --     FACING_DIRECTION,
          --     IMAGES_VIDEOS_UPLOAD,
          --     MAP_LOCATION,
          --     NEAR_BY_LOCATIONS,
          --     LAT_LONG,
          --     LANDMARK,
          --     LISTING_BY,
          --     PRICE,
          --     PROJECT_NAME,
          --     PROPERTY_NAME,
          --     PURPOSE,
          --     USER_ID,
          --     PROPERTY_CATEGORY,
          --     PROPERTY_UNITS,
          --     AMENITIES
          -- )
          -- VALUES (
          --     :P41_PROPERTY_TYPE,
          --     :P41_AVAILABILITY_STATUS,
          --     :P41_ADDRESS,
          --     :P41_PURCHASE_DATE,
          --     :P41_AREA,
          --     :P41_PROPERTY_AGE,
          --     :P41_FLOOR_NUMBER,
          --     :P41_TOTAL_FLOORS,
          --     :P41_FURNISHING_STATUS,
          --     :P41_PROPERTY_FACING,
          --     NULL, -- IMAGES_VIDEOS_UPLOAD (optional field, handled by blob table)
          --     :P41_MAP_LOCATION,
          --     :P41_NEAR_BY_LOCATION,
          --     :P41_LATITUDE || ',' || :P41_LONGITUDE,
          --     :P41_LANDMARK,
          --     :USER_ID,
          --     :P41_PRICE,
          --     :P41_PROJECT_NAME,
          --     :P41_PROPERTY_NAME,
          --     :P41_PURPOSE,
          --     :USER_ID,
          --     :P41_CATEGORY,
          --     :P41_UNITS,
          --     :P41_GENERAL_AMENITIES || ',' ||
          --     :P41_LIFESTYLE_AMENITIES || ',' ||
          --     :P41_ECO_FRIENDLY_AMENITIES || ',' ||
          --     :P41_PREMIUM_AMENITIES || ',' ||
          --     :P41_CONVENIENCE
          -- );
      --     RETURNING PROPERTY_ID INTO v_property_id;
      
      --     -- Process uploaded files from DROPZONE_UPLOAD collection
      --     FOR l_rec_files IN l_cur_files LOOP
      --         INSERT INTO PMS002_PROPERTY_IMAGES (
      --             PROEPRTY_ID,
      --             FILE_NAME,
      --             MIME_TYPE,
      --             UPLOADED_ON,
      --             IMAGE_BLOB
      --         ) VALUES (
      --             v_property_id,
      --             l_rec_files.filename,
      --             l_rec_files.mime_type,
      --             l_rec_files.date_created,
      --             l_rec_files.file_content
      --         );
      --     END LOOP;
      
      --     -- Clear the collection after processing
      --     IF apex_collection.collection_exists(p_collection_name => 'DROPZONE_UPLOAD') THEN
      --         apex_collection.delete_collection(p_collection_name => 'DROPZONE_UPLOAD');
      --     END IF;
      -- END;
      
      INSERT INTO PMS002_PROPERTY (
          PROPERTY_TYPES_ID,
          STATUS_ID,
          ADDRESS,
          PURCHASE_DATE,
          AREA,
          PROPERTY_AGE,
          FLOOR_NUMBER,
          TOTAL_FLOORS,
          FURNISHING_STATUS,
          FACING_DIRECTION,
          IMAGES_VIDEOS_UPLOAD,
          MAP_LOCATION,
          NEAR_BY_LOCATIONS,
          LAT_LONG,
          LANDMARK,
          LISTING_BY,
          PRICE,
          PROJECT_NAME,
          PROPERTY_NAME,
          PURPOSE,
          USER_ID,
          PROPERTY_CATEGORY,
          PROPERTY_UNITS,
          AMENITIES
      )
      VALUES (
          :P41_PROPERTY_TYPE,
          :P41_AVAILABILITY_STATUS,
          :P41_ADDRESS,
          :P41_PURCHASE_DATE,
          :P41_AREA,
          :P41_PROPERTY_AGE,
          :P41_FLOOR_NUMBER,
          :P41_TOTAL_FLOORS,
          :P41_FURNISHING_STATUS,
          :P41_PROPERTY_FACING,
          :P41_UPLOAD_IMAGES,
          :P41_MAP_LOCATION,
          :P41_NEAR_BY_LOCATION,
          :P41_LATITUDE || ',' || :P41_LONGITUDE,
          :P41_LANDMARK,
          :P41_LISTING_BY,
          :P41_PRICE,
          :P41_PROJECT_NAME,
          :P41_PROPERTY_NAME,
          :P41_PURPOSE,
          :USER_ID,
          :P41_CATEGORY,
          :P41_UNITS,
          :P41_GENERAL_AMENITIES || ',' ||
          :P41_LIFESTYLE_AMENITIES || ',' ||
          :P41_ECO_FRIENDLY_AMENITIES || ',' ||
          :P41_PREMIUM_AMENITIES || ',' ||
          :P41_CONVENIENCE
      );

  execution: 
