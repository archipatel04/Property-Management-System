- # ====== Page Item: P41_UNITS ================================
  id: 39304002595140608126
  identification: 
    name: P41_UNITS
    type: Radio Group

  label: 
    label: Units
    alignment: Left

  settings: 
    number-of-columns: 4
    page-action-on-selection: None

  layout: 
    sequence: 40
    region: Property Details # 39304002060643608121
    slot: BODY
    alignment: Left
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic
    label-column-span: Page Template Default

  appearance: 
    template: PMS_Optional_Above
    template-options: 
    - '#DEFAULT#'
    - t-Form-fieldContainer--large

  validation: 
    value-required: false

  list-of-values: 
    type: SQL Query
    sql-query: |
      SELECT PROPERTY_UNITS_NAME AS DISPLAY_VALUE,
             PROPERTY_UNITS_ID AS RETURN_VALUE
      FROM PMS002_PROPERTY_UNITS
      WHERE PROPERTY_UNITS_ID IN (
          SELECT TO_NUMBER(REGEXP_SUBSTR(PROPERTY_UNIT, '[^,]+', 1, LEVEL))
          FROM PMS002_PROPERTY_CATEGORY
          WHERE PROPERTY_SUB_CATEGORY_ID = :P41_CATEGORY
          CONNECT BY REGEXP_SUBSTR(PROPERTY_UNIT, '[^,]+', 1, LEVEL) IS NOT NULL
      )
      ORDER BY PROPERTY_UNITS_NAME;
    display-extra-values: false
    display-null-value: false

  cascading-list-of-values: 
    parent-item(s): 
    - P41_CATEGORY
    items-to-submit: 
    - P41_UNITS
    parent-required: true

