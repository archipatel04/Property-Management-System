        Please provide a height in pixels.

  - # ====== Custom Attribute: Chunk Size (in KB) ================
    id: 42434174707342018853
    identification: 
      static-id: attribute_09
      attribute: 9
      name: Chunk Size (in KB)
      scope: Application

    layout: 
      sequence: 90

    settings: 
      type: Number
      common: true
      show-in-wizard: true
      required: true
      translatable: false

    default: 
      value: 1048576

    help: 
      help-text: |
