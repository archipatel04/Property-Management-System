- # ====== Plugin: Heart Toggle ================================
  id: 14695474073079280
  identification: 
    name: Heart Toggle
    internal-name: HEART_TOGGLE
    type: Template Component

  advanced: 
    quick-pick: false

  subscription: 
    version-number: 41145863468983

  templates: 
    available-as: 
    - Single (Partial)
    partial: |
      <span class="heart-toggle" onclick="toggleHeart(this)">
        <i class="fa fa-heart#ISFAVOURITE#"></i>
      </span>
      
      <script>
        function toggleHeart(el) {
          const icon = el.querySelector('i');
          const isLiked = icon.classList.contains('fa-heart');
      
          if (isLiked) {
            icon.classList.remove('fa-heart');
            icon.classList.add('fa-heart-o');
            icon.style.color = '';
          } else {
            icon.classList.remove('fa-heart-o');
            icon.classList.add('fa-heart');
            icon.style.color = 'red';
          }
        }
      </script>
      
      <style>
        .heart-toggle {
          cursor: pointer;
          font-size: 24px;
          transition: transform 0.2s ease;
        }
      
        .heart-toggle:hover {
          transform: scale(1.2);
        }
        .fa-heart {
          color: red;
        }
      </style>
      
    translate-templates: false
    default-escape-mode: HTML

