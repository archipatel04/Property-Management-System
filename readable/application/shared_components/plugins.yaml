  - # ====== Custom Attribute: Image Resizing ====================
    id: 42434142747860747613
    identification: 
      static-id: attribute_22
      attribute: 22
      name: Image Resizing
      scope: Component

    layout: 
      sequence: 200

    settings: 
      type: Select List
      lov-type: Static
      common: true
      show-in-wizard: true
      required: true
      translatable: false

    default: 
      value: false

    help: 
      help-text: |
        If true, images are resized to a specified size. This happens on client side before uploading the file to server. Saving upload bandwidth and reducing upload time.<br>
        Please set at least one resize attribute, e.g. Resize Width or Resize Height.

    entries: 
    - # ====== Entry: True =========================================
      id: 42434143563539748130
      entry: 
        sequence: 10
        display: True
        return: true

      advanced: 
        quick-pick: false

    - # ====== Entry: False ========================================
      id: 42434143977778748779
      entry: 
        sequence: 20
        display: False
        return: false

      advanced: 
        quick-pick: false

  - # ====== Custom Attribute: Resize Width ======================
