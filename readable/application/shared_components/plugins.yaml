  - # ====== Custom Attribute: Use Image source from BLOB Column (
    id: 80920649008654669196
    identification: 
      static-id: attribute_02
      attribute: 2
      name: Use Image source from BLOB Column (PLEASE Check Help)
      scope: Component

    layout: 
      sequence: 10

    settings: 
      type: Yes/No
      common: true
      show-in-wizard: true
      required: false
      translatable: false

    default: 
      value: N

    help: 
      help-text: Choose 'No' if in your SQL Source are only SRC_TYPE with 'url' or 'Yes' when in your SQL Source is also SRC_TYPE with 'blob'. When use SRC_TYPE = 'blob' then SRC_VALUE is the primary key from the PL/SQL block. Please do not load BLOB Column in SQL Region. The BLOB will be downloaded in PL/SQL block below!

  - # ====== Custom Attribute: Execute to get Image Sources ======
    id: 80920721964987672380
    identification: 
      static-id: attribute_03
      attribute: 3
      name: Execute to get Image Sources
      scope: Component

    layout: 
      sequence: 30

    settings: 
      type: PL/SQL Code
      common: true
      show-in-wizard: true
      required: true
      translatable: false

    default: 
      value: |
        /* This PL/SQL block is called when SRC_TYPE in SQL Source is 'blob' */
        /* The SRC_VALUE is the Key for calling this PL/SQL Block. So this PL/SQL downloads image when required by the plug-in */
        /* Please check help for more information */
        /* When Plug-in is not working then check APEX Debug */
        declare
            l_file_name   varchar2(255);
            l_mime_type   varchar2(255);
            l_binary_file blob;
            l_pk          varchar2(32767) := :PK; /* :PK is the SRC_VALUE from SQL Source, if it's a number change L_PK to number */
        begin
            select
                #your_file_name_col#,
                #your_mime_type_col#,
                #your_blob_col#
            into
                l_file_name,
                l_mime_type,
                l_binary_file
            from
                #your_table#
            where
                #your_primary_key_column# = l_pk;
        
            :FILE_NAME   := l_file_name;
            :MIME_TYPE   := l_mime_type;
             /* Please ignore PLS-00382: expression is of wrong type
               because binding of :BLOB is not supported by current
               APEX PL/SQL Validator 
             */
            :BINARY_FILE := l_binary_file;
        exception
            when others then
                apex_debug.error(sqlerrm);
                apex_debug.error(dbms_utility.format_error_stack);
        end;

    condition: 
      depending-on-custom-attribute: Use Image source from BLOB Column (PLEASE Check Help) # 80920649008654669196
      depending-on-condition-type: equal to
      expression: Y
      always-evaluate: true

    help: 
      help-text: |
        <pre>
        /* This PL/SQL block is called when SRC_TYPE in SQL Source is 'blob' */
        /* The SRC_VALUE is the Key for calling this PL/SQL Block. So this PL/SQL downloads image when required by the plug-in */
        /* Please check help for more information */
        /* When Plug-in is not working then check APEX Debug */
        declare
            l_file_name   varchar2(255);
            l_mime_type   varchar2(255);
            l_binary_file blob;
            l_pk          varchar2(32767) := :PK; /* :PK is the SRC_VALUE from SQL Source, if it's a number change L_PK to number */
        begin
            select
                #your_file_name_col#,
                #your_mime_type_col#,
                #your_blob_col#
            into
                l_file_name,
                l_mime_type,
                l_binary_file
            from
                #your_table#
            where
                #your_primary_key_column# = l_pk;
        
            :FILE_NAME   := l_file_name;
            :MIME_TYPE   := l_mime_type;
             /* Please ignore PLS-00382: expression is of wrong type
               because binding of :BLOB is not supported by current
               APEX PL/SQL Validator 
             */
            :BINARY_FILE := l_binary_file;
        exception
            when others then
                apex_debug.error(sqlerrm);
                apex_debug.error(dbms_utility.format_error_stack);
        end;
        </pre>

