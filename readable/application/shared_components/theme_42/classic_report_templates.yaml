- # ====== Classic Report Template: PMS CARDS ==================
  id: 3736374797997190
  identification: 
    name: PMS CARDS
    identifier: PMS_CARDS
    class: Custom 1

  advanced: 
    translatable: false

  template-options: 
    preset: 
    - t-Cards--basic
    - t-Cards--3cols
    - t-Cards--animColorFill

