    type: Named Column (row template)

  report-template: 
    top: ' '
    bottom: |
      <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" /> -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
       
      
      
      <style>
      .property-card {
        position: relative;
        width: 470px;
        height: 430px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        margin: 10px;
        font-family: 'Segoe UI', sans-serif;
        display: inline-block;
        vertical-align: top;
      }
       
      .property-card:hover {
        transform: translateY(-6px) scale(1.015);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      }
       
      /* Image Section */
      .property-image img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        transition: transform 0.3s ease;
      }
       
      .property-card:hover .property-image img {
        transform: scale(1.05);
      }
       
      /* Details Section */
      .property-details {
        padding: 16px;
      }
       
      .property-title {
        font-size: 1.3rem;
        font-weight: bold;
        color: #000000;
        margin-bottom: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: -15px;
      }
       
      .property-subtitle,
      .property-location,
      .property-status,
      .property-size {
        font-size: 0.92rem;
        color: #555;
        margin: 4px 0;
      }
       
      .property-price {
        color: #2e7d32;
        font-weight: 600;
        font-size: 1.05rem;
        margin-top: 8px;
      }
       
      /* Status Badge */
      .property-status {
        display: inline-block;
        padding: 4px 10px;
        /* background : #FFF0F5 */
        background: linear-gradient(to right, #FFF0F5, #FFF0F5);
        color: black;
        font-size: 0.8rem;
        font-weight: 500;
        border-radius: 12px;
        margin-bottom: 6px;
      }
       
      /* Card Buttons */
      .card-actions {
        position: absolute;
        top: 10px;
        right: 10px;
        display: flex;
        gap: 10px;
        z-index: 2;
      }
       
       
      /* Responsive if needed */
      @media (max-width: 768px) {
        .property-card {
          width: 100%;
        }
      }
       
      /* for rent - sale */
      .property-badges {
        position: absolute;
        top: 12px;
        left: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 3;
      }
       
      .badge {
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 600;
        color: #fff;
        width: fit-content;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      }
      
      .badge-status {
        background-color: #000000; /* Black for Sale/Rent */
        text-transform: uppercase;
      }
      
      
      
       
      </style>

  row-template-1: 
    template: |
      <a href="f?p=&APP_ID.:56:&SESSION.::NO::P56_PROPERTY_ID:#PROPERTY_ID#" class="property-card-link">
        <div class="property-card">
       
           <!-- Property Badges -->
          <div class="property-badges">
            <!-- <span class="badge badge-featured">Featured</span> -->
            <!-- <span class="badge badge-status">#PROPERTY_PURPOSE#</span> For Sale / Rent -->
            <span class="badge badge-status #PURPOSE_CLASS#">#PROPERTY_PURPOSE#</span>
      
          </div>
       
          <!-- Property Image -->
          <div class="property-image">
            <img src="#FIRST_IMAGE_URL#" alt="#PROPERTY_NAME#">
          </div>
       
          <!-- Property Details -->
          <div class="property-details">
            <!-- <h2 class="property-title">#PROJECT_NAME# #PROPERTY_NAME#</h2> -->
            <h2 class="property-title">#DISPLAY_PROPERTY_TITLE#</h2>
            <p class="property-subtitle">#PROPERTY_UNITS_NAME# in #PROPERTY_CATEGORY_NAME#</p>
            <p class="property-location"> <i class="fas fa-map-marker-alt"></i> #ADDRESS#</p>
      
            <p class="property-price">INR #PRICE#</p>
            <p class="property-status">🏠 #PROPERTY_AVAILABILITY_STATUS#</p>
            <p class="property-size">#AREA# sq.ft (#PROPERTY_UNITS_NAME#)</p>
          </div>
       
        </div>
      </a>
    condition: 0

