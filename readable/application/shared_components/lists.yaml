  - # ====== Entry: &APP_DISPLAY. ================================
    id: 30584998191995713321
    label: 
      label: '&APP_DISPLAY.'

    layout: 
      sequence: 10

    is-current: 
      type: Target Page

    link: 
      target: '#'

    click-counting: 
      count-clicks: false

    user-defined-attributes: 
      translatable: false
      1.: |
        <!-- User name and image in one centered row -->
        <span class="t-Button-badge" style="display: flex; align-items: center; gap: 10px;">
        <!-- User name display -->
        <span class="zone" style="font-size: 12px; font-weight: bold;">&APP_DISPLAY_NAME.</span>
         
          <span id="user-avatar-container" style="position: relative; display: inline-block; width:35px; height:35px;">
        <!-- Image -->
        <img id="user-avatar-img"
        
                 src="f?p=&APP_ID.:0:&APP_SESSION.:APPLICATION_PROCESS=GET_PROFILE_IMAGE:::APP_IMAGE_ID:&APP_USER."
        
                 alt="User"
        
                 style="width:100%; height:100%; border-radius:50%; object-fit:cover; position:absolute; top:0px; left:0;"
        
                 onerror="this.style.display='none'; document.getElementById('user-avatar-initials').style.display='flex';">
         
            <!-- Fallback Initials -->
        <span id="user-avatar-initials"
        
                  style="display:none; width:100%; height:100%; border-radius:50%; background-color:#fff; color:#DA4153; font-weight:bold; align-items:center; justify-content:center; font-size:14px; position:absolute; top:1.5px; left:0;">
        </span>
        </span>
        </span>
         
         
        <!-- JavaScript to handle fallback -->
        <script>
        
          const img = document.getElementById("user-avatar-img");
        
          const initialsSpan = document.getElementById("user-avatar-initials");
         
          fetch("f?p=&APP_ID.:0:&APP_SESSION.:APPLICATION_PROCESS=GET_PROFILE_IMAGE:::APP_IMAGE_ID:&APP_USER.")
        
            .then(res => res.blob())
        
            .then(blob => {
        
              if (blob.type.startsWith("image/")) {
        
                const url = URL.createObjectURL(blob);
        
                img.src = url;
        
                img.style.display = "block";
        
                initialsSpan.style.display = "none";
        
              } else {
        
                // Not an image – treat as text initials
        
                blob.text().then(text => {
        
                  initialsSpan.textContent = text.trim() || "NA";
        
                  initialsSpan.style.display = "flex";
        
                  img.style.display = "none";
        
                });
        
              }
        
            })
        
            .catch(() => {
        
              initialsSpan.textContent = "NA";
        
              initialsSpan.style.display = "flex";
        
              img.style.display = "none";
        
            });
        </script>
         
      2.: has-username

    server-side-condition: 
      type: User is Authenticated (not public)

