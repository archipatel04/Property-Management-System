- # ====== List: RBAC_NAV ======================================
  id: 33339902415156167195
  identification: 
    name: RBAC_NAV

  subscription: 
    version-number: 15634700332452

  source: 
    type: SQL Query
    sql-query: |
      SELECT null,
       
              NM.MENU_NAME label,
       
             'f?p=&APP_ID.:'|| P.APEX_PAGE_ID ||':'||:APP_SESSION||':::::' target,
       
             null is_current,
       
             NM.ICON
       
          -- U.USER_ID,
       
          -- U.USER_DISP_NAME,
       
          -- U.EMAIL,
       
          -- R.ROLE_ID,
       
          -- R.ROLE_NAME,
       
          -- URAM.USER_ROLE_ACESS_ID,
       
          -- P.PAGE_ID,
       
          -- P.PAGE_NAME,
       
          -- P.APEX_PAGE_ID,
       
          -- NM.MENU_ID,
       
          -- NM.MENU_SEQ_ID,
       
          -- NM.MENU_NAME,
       
          -- NM.PARENT_MENU_ID,
       
          -- NM.PAGE_ID,
       
          -- NM.APEX_PAGE_ID
       
      FROM
       
          PMS_USERS U,
       
          PMS_USER_ROLE_ACCESS_MASTER URAM,
       
          PMS_ROLES R,
       
          PMS_ROLE_PAGE_ACCESS_MASTER RPAM,
       
          PMS_PAGE_MASTER P,
       
          PMS_NAVIGATION_MENU_MASTER NM
       
      WHERE 1 = 1 
          AND U.USER_ID = URAM.USER_ID
       
          AND URAM.ROLE_ID = R.ROLE_ID
       
          AND R.ROLE_ID = RPAM.ROLE_ID
       
          AND RPAM.PAGE_ID = P.PAGE_ID
       
          AND P.PAGE_ID = NM.PAGE_ID
       
          AND U.USER_ID = :USER_ID
       
          order by NM.MENU_SEQ_ID;

