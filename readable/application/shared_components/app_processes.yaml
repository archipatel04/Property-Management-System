      DECLARE
      
          l_length NUMBER;
      
      BEGIN
      
          FOR c1 IN (
      
              SELECT * 
      
              FROM PMS_USERS
      
              WHERE USER_ID = :USER_ID
      
          ) LOOP
      
              BEGIN
      
                  l_length := dbms_lob.getlength(c1.USER_BLOB);
      
              EXCEPTION
      
                  WHEN OTHERS THEN
      
                      l_length := 0; -- If it's NULL or inaccessible
      
              END;
       
              IF l_length > 0 THEN
      
                  -- Picture exists, download it
      
                  sys.htp.init;
      
                  sys.owa_util.mime_header(c1.MIME_TYPE, FALSE);
      
                  sys.htp.p('Content-length: ' || l_length);
      
                  sys.htp.p('Content-Disposition: attachment; filename="' || c1.FILE_TYPE || '"');
      
                  sys.htp.p('Cache-Control: max-age=3600'); 
      
                  sys.owa_util.http_header_close;
      
                  sys.wpg_docload.download_file(c1.USER_BLOB);
      
              ELSE
      
                  -- No picture: Show initials
      
                  sys.htp.init;
      
                  sys.owa_util.mime_header('text/plain', FALSE);
      
                  sys.htp.p('Content-Disposition: inline');
      
                  sys.htp.p('Cache-Control: no-cache'); 
      
                  sys.owa_util.http_header_close;
       
                  -- Print initials
      
                  sys.htp.p(
      
                      NVL(SUBSTR(c1.FIRST_NAME, 1, 1), '?') || 
      
                      NVL(SUBSTR(c1.LAST_NAME, 1, 1), '?')
      
                  );
      
              END IF;
       
              apex_application.stop_apex_engine;
      
          END LOOP;
      
      END;

